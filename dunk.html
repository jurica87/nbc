<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunk Contest - NBC Baskets Nordhorn</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="manifest" href="./site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nbc: { orange: '#F2722C', purple: '#7457A3', dark: '#1a1a2e' }
                    },
                    fontFamily: { sans: ['Roboto', 'sans-serif'], heading: ['Oswald', 'sans-serif'] }
                }
            }
        }
    </style>
    <link rel="stylesheet" href="./css/cookie-consent.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { overflow: hidden; background: #0a0a1a; user-select: none; }
        #gameCanvas { display: block; }
        .hidden { display: none !important; }

        /* NBC Dunk Contest - Dark Glassmorphism Style */
        .game-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(36px, 9vw, 68px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #F2722C 0%, #ff9a56 50%, #7457A3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            line-height: 1.05;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 20px rgba(242, 114, 44, 0.3));
        }

        .title-small { font-size: clamp(24px, 6vw, 42px); }

        .subtitle {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(12px, 3vw, 18px);
            color: #7457A3;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 24px;
        }

        /* Animated background for overlays */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: radial-gradient(ellipse at center, rgba(20,20,40,0.97) 0%, rgba(10,10,20,0.99) 100%);
        }

        .btn {
            padding: 14px 44px;
            font-size: 16px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, #F2722C, #e06010);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(242, 114, 44, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(242, 114, 44, 0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: scale(0.97); }

        .btn-secondary {
            background: linear-gradient(135deg, #7457A3, #5a3d8a);
            box-shadow: 0 0 20px rgba(116, 87, 163, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { box-shadow: 0 0 30px rgba(116, 87, 163, 0.5), inset 0 1px 0 rgba(255,255,255,0.15); }

        .btn-outline {
            background: transparent;
            border: 2px solid #F2722C;
            color: #F2722C;
            box-shadow: 0 0 15px rgba(242, 114, 44, 0.15);
        }
        .btn-outline:hover { background: rgba(242, 114, 44, 0.1); box-shadow: 0 0 25px rgba(242, 114, 44, 0.3); }

        .instructions {
            color: #94a3b8;
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            max-width: 420px;
            padding: 0 20px;
        }

        .instructions strong { color: #F2722C; }
        .instructions kbd {
            background: rgba(242,114,44,0.15);
            border: 1px solid rgba(242,114,44,0.3);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'Roboto', sans-serif;
            font-size: 11px;
            color: #F2722C;
        }

        .final-score {
            font-family: 'Oswald', sans-serif;
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #F2722C, #ff9a56);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 8px 0;
            filter: drop-shadow(0 0 20px rgba(242, 114, 44, 0.4));
        }

        .score-label {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
            width: 100%;
            max-width: 360px;
            padding: 0 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .stat-box .value {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #F2722C;
        }

        .stat-box .label {
            font-family: 'Roboto', sans-serif;
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .new-record {
            color: #fbbf24;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-gold 1s ease-in-out infinite;
            margin-bottom: 4px;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 16px;
        }

        .hud-score {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px rgba(242, 114, 44, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-score span { color: #F2722C; font-size: 26px; }

        .hud-attempt {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            color: #7457A3;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: right;
        }

        .hud-attempt span { color: #F2722C; }

        /* Stars rating */
        .stars-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 8px 0;
        }

        .star {
            font-size: 40px;
            color: #333;
            transition: all 0.3s ease;
        }

        .star.lit {
            color: #F2722C;
            text-shadow: 0 0 20px rgba(242, 114, 44, 0.6);
            animation: starPop 0.4s ease-out;
        }

        @keyframes starPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Grade */
        .grade-display {
            font-family: 'Oswald', sans-serif;
            font-size: 80px;
            font-weight: 700;
            line-height: 1;
        }

        .grade-A { color: #2ecc71; text-shadow: 0 0 30px rgba(46,204,113,0.5); }
        .grade-B { color: #3498db; text-shadow: 0 0 30px rgba(52,152,219,0.5); }
        .grade-C { color: #F2722C; text-shadow: 0 0 30px rgba(242,114,44,0.5); }
        .grade-D { color: #e67e22; text-shadow: 0 0 30px rgba(230,126,34,0.5); }
        .grade-F { color: #e74c3c; text-shadow: 0 0 30px rgba(231,76,60,0.5); }

        /* Trick name popup */
        .trick-popup {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #F2722C;
            text-shadow: 0 0 20px rgba(242, 114, 44, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            pointer-events: none;
            z-index: 6;
            white-space: nowrap;
        }

        .trick-popup.show { animation: trickAnim 1.2s ease-out forwards; }

        @keyframes trickAnim {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(20px); }
            25% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) scale(1) translateY(-30px); }
        }

        /* Controls hint */
        .controls-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-family: 'Roboto', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: hint-pulse 3s ease-in-out infinite;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }

        @keyframes hint-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

        .member-btn {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: linear-gradient(135deg, #F2722C 0%, #7457A3 100%);
            color: white; padding: 12px 24px; border-radius: 50px;
            font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
            box-shadow: 0 4px 15px rgba(242, 101, 34, 0.4);
            animation: glow-pulse 2s ease-in-out infinite, float 3s ease-in-out infinite;
            transition: all 0.3s ease; border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .member-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #F2722C, 0 0 60px #7457A3; }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 5px #F2722C, 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #7457A3; transform: scale(1); }
            50% { box-shadow: 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #F2722C, 0 0 60px #7457A3; transform: scale(1.02); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* Share buttons */
        .share-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .share-btn {
            padding: 8px 20px;
            font-size: 12px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .share-btn:hover {
            background: rgba(242,114,44,0.15);
            border-color: #F2722C;
            color: #F2722C;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="hidden">
        <div class="hud-top">
            <div class="hud-score">PUNKTE <span id="hudScore">0</span></div>
            <div>
                <div class="hud-attempt">VERSUCH <span id="hudAttempt">1</span>/5</div>
            </div>
        </div>
        <div class="trick-popup" id="trickPopup">🌪️ WINDMILL!</div>
        <div class="controls-hint" id="controlsHint">📱 TIPPE ZUM DUNKEN &nbsp;|&nbsp; 💻 LEERTASTE / Klicken</div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="overlay-screen">
        <div class="game-title">🏀 DUNK<br>CONTEST</div>
        <div class="subtitle">NBC Baskets Nordhorn</div>
        <button class="btn" onclick="game.start()">CONTEST STARTEN</button>
        <div class="button-row">
            <button class="btn btn-secondary" onclick="game.showLeaderboard()">🏆 BESTENLISTE</button>
        </div>
        <div class="instructions">
            <strong>5 Versuche</strong> – Je kreativer der Dunk, desto mehr Punkte!<br>
            ⬇️ <strong>Halte</strong> zum Aufladen &nbsp;|&nbsp; ⬆️ <strong>Loslassen</strong> zum Wegspringen<br>
            <strong>Wische</strong> / <kbd>←</kbd> <kbd>→</kbd> in der Luft für Tricks!<br>
            Lande sauber für Bonus-Punkte.
        </div>
    </div>

    <!-- RESULT SCREEN (between attempts) -->
    <div id="resultScreen" class="overlay-screen hidden">
        <div class="game-title title-small">VERSUCH <span id="resultAttempt">1</span></div>
        <div class="stars-container">
            <span class="star" id="star1">★</span>
            <span class="star" id="star2">★</span>
            <span class="star" id="star3">★</span>
            <span class="star" id="star4">★</span>
            <span class="star" id="star5">★</span>
        </div>
        <div class="score-label">ERGEBNIS</div>
        <div class="final-score" id="attemptScore">0</div>
        <div id="attemptTrick" style="font-family:'Oswald';font-size:18px;color:#7457A3;text-transform:uppercase;letter-spacing:2px;"></div>
        <div class="button-row" style="margin-top: 20px;">
            <button class="btn" id="nextBtn" onclick="game.nextAttempt()">NÄCHSTER VERSUCH</button>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="overlay-screen hidden">
        <div class="game-title title-small">CONTEST BEENDET</div>
        <div id="newRecordLabel" class="new-record hidden">🏆 NEUER REKORD!</div>
        <div class="stars-container" id="finalStars">
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
        </div>
        <div class="score-label">GESAMTPUNKTE</div>
        <div class="final-score" id="finalScore">0</div>
        <div id="finalGrade" class="grade-display grade-A" style="font-size:64px;">A</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="value" id="statTricks">0</div>
                <div class="label">Tricks</div>
            </div>
            <div class="stat-box">
                <div class="value" id="statBest">0</div>
                <div class="label">Bester</div>
            </div>
            <div class="stat-box">
                <div class="value" id="statLands">0</div>
                <div class="label">Sauber</div>
            </div>
        </div>
        <div class="share-row">
            <button class="share-btn" onclick="game.shareScore()">📋 ERGEBNIS TEILEN</button>
            <button class="share-btn" onclick="game.showLeaderboard()">🏆 BESTENLISTE</button>
        </div>
        <div class="button-row">
            <button class="btn" onclick="game.start()">NOCHMAL</button>
            <button class="btn btn-outline" onclick="game.showMenu()">MENÜ</button>
        </div>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div id="leaderboardScreen" class="overlay-screen hidden">
        <div class="game-title title-small">🏆 BESTENLISTE</div>
        <div id="leaderboardList" style="width:100%;max-width:400px;padding:0 20px;max-height:50vh;overflow-y:auto;">
        </div>
        <div class="button-row" style="margin-top:20px;">
            <button class="btn btn-outline" onclick="game.hideLeaderboard()">← ZURÜCK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── LEADERBOARD ───
        const LB_KEY = '***;
        const MAX_LB = 10;

        function getLeaderboard() {
            try { const r = localStorage.getItem(LB_KEY); return r ? JSON.parse(r) : []; }
            catch(e) { return []; }
        }

        function saveToLeaderboard(name, score) {
            const lb = getLeaderboard();
            lb.push({ name: name || 'Anonym', score, date: Date.now() });
            lb.sort((a,b) => b.score - a.score);
            lb.splice(MAX_LB);
            try { localStorage.setItem(LB_KEY, JSON.stringify(lb)); } catch(e) {}
            return lb;
        }

        function renderLeaderboard() {
            const c = document.getElementById('leaderboardList');
            const lb = getLeaderboard();
            if (lb.length === 0) {
                c.innerHTML = '<div style="text-align:center;color:#64748b;padding:30px;font-family:Roboto;font-size:14px;">Noch keine Einträge.<br>Sei der Erste!</div>';
                return;
            }
            let html = '<table style="width:100%;border-collapse:collapse;">';
            html += '<thead><tr style="color:#F2722C;font-family:Oswald;font-size:12px;text-transform:uppercase;letter-spacing:1px;">';
            html += '<th style="padding:8px;text-align:left;width:40px;">#</th>';
            html += '<th style="padding:8px;text-align:left;">Name</th>';
            html += '<th style="padding:8px;text-align:right;">Punkte</th></tr></thead><tbody>';
            lb.forEach((e,i) => {
                const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
                const color = i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#F2722C':'#e2e8f0';
                html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">`;
                html += `<td style="padding:10px 8px;color:${color};font-family:Oswald;">${medal}</td>`;
                html += `<td style="padding:10px 8px;color:#e2e8f0;font-family:Roboto;font-size:14px;">${escHtml(e.name)}</td>`;
                html += `<td style="padding:10px 8px;color:${color};font-family:Oswald;text-align:right;">${e.score}</td></tr>`;
            });
            html += '</tbody></table>';
            c.innerHTML = html;
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ─ TRICK DEFINITIONS ──
        const TRICKS = [
            { name: 'Windmill', key: 'windmill', points: 30, input: 'spin360', icon: '🌪️' },
            { name: 'Tomahawk', key: 'tomahawk', points: 25, input: 'overhead', icon: '🪓' },
            { name: 'Between Legs', key: 'betweenlegs', points: 35, input: 'betweenlegs', icon: '🦵' },
            { name: '360 Spin', key: 'spin360', points: 40, input: 'spin360', icon: '🌀' },
            { name: 'Reverse', key: 'reverse', points: 20, input: 'reverse', icon: '↩️' },
            { name: 'Double Clutch', key: 'doubleclutch', points: 30, input: 'doubleclutch', icon: '✌️' },
            { name: 'Free Throw Line', key: 'freethrow', points: 50, input: 'longDistance', icon: '📏' },
            { name: 'East Bay Funk', key: 'eastbay', points: 45, input: 'eastbay', icon: '🔥' },
        ];

        // ── GAME ──
        class DunkContest {
            constructor() {
                this.state = 'menu';
                this.totalScore = 0;
                this.attemptScores = [];
                this.currentAttempt = 0;
                this.maxAttempts = 5;
                this.bestCombo = 0;
                this.trickCount = 0;
                this.cleanLands = 0;
                this.highscore = getHighscore().reduce((a,b) => Math.max(a, b.score), 0);
                this.groundY = 0;
                this.hoopX = 0;
                this.hoopY = 0;

                // Player
                this.player = {
                    x: 0, y: 0,
                    vx: 0, vy: 0,
                    width: 40, height: 58,
                    rotation: 0,
                    rotSpeed: 0,
                    armAngle: 0,
                    squashX: 1, squashY: 1,
                    state: 'ready', // ready, charging, jumping, dunking, landing, falling
                    chargeTime: 0,
                    maxCharge: 1500,
                    airTime: 0,
                    tricksPerformed: [],
                    currentTrick: null,
                    hasBall: true,
                    onFire: false,
                    fireTimer: 0
                };

                // Ball
                this.ball = {
                    x: 0, y: 0,
                    radius: 13,
                    rotation: 0
                };

                // Particles
                this.particles = [];
                this.landParticles = [];
                this.dunkParticles = [];

                // Crowd
                this.crowd = [];
                this.initCrowd();

                // Input
                this.charging = false;
                this.keys = {};
                this.touchStartY = 0;

                this.setupInputs();

                // Camera
                this.camY = 0;
                this.targetCamY = 0;
                this.screenShake = 0;

                this.loop();
            }

            initCrowd() {
                this.crowd = [];
                const rows = 3;
                const seatsPerRow = 20;
                for (let r = 0; r < rows; r++) {
                    for (let s = 0; s < seatsPerRow; s++) {
                        this.crowd.push({
                            x: (s / seatsPerRow) * 100 + (Math.random() - 0.5) * 3,
                            y: 5 + r * 8,
                            color: ['#F2722C','#7457A3','#3498db','#e74c3c','#2ecc71','#f39c12'][Math.floor(Math.random() * 6)],
                            animOffset: Math.random() * Math.PI * 2,
                            excitement: 0
                        });
                    }
                }
            }

            setupInputs() {
                // Keyboard
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (this.state !== 'playing') return;

                    if (e.code === 'Space' || e.code === 'ArrowUp') {
                        e.preventDefault();
                        if (this.player.state === 'ready' || this.player.state === 'charging') {
                            this.startCharge();
                        }
                    }
                    if (e.code === 'ArrowLeft') this.keys['left'] = true;
                    if (e.code === 'ArrowRight') this.keys['right'] = true;
                    if (e.code === 'KeyA') this.keys['left'] = true;
                    if (e.code === 'KeyD') this.keys['right'] = true;
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                    if (this.state !== 'playing') return;

                    if ((e.code === 'Space' || e.code === 'ArrowUp') && this.charging) {
                        this.releaseJump();
                    }
                    if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys['left'] = false;
                    if (e.code === 'ArrowRight' || e.code === 'KeyD') this.keys['right'] = false;
                });

                // Touch / Mouse
                const onDown = (y) => {
                    if (this.state !== 'playing') return;
                    this.touchStartY = y;
                    if (this.player.state === 'ready' || this.player.state === 'charging') {
                        this.startCharge();
                    }
                };

                const onUp = () => {
                    if (this.state !== 'playing') return;
                    if (this.charging) this.releaseJump();
                };

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    // Check trick buttons first
                    if (this.state === 'playing' && (this.player.state === 'jumping' || this.player.state === 'dunking')) {
                        const tricks = ['windmill', 'betweenlegs', 'tomahawk', 'reverse'];
                        const btnW = 56, btnH = 56, gap = 10;
                        const totalW = tricks.length * btnW + (tricks.length - 1) * gap;
                        const startX = (canvas.width - totalW) / 2;
                        const btnY = canvas.height - 80;
                        if (t.clientY >= btnY && t.clientY <= btnY + btnH) {
                            const idx = Math.floor((t.clientX - startX) / (btnW + gap));
                            if (idx >= 0 && idx < tricks.length && !this.player.tricksPerformed.includes(tricks[idx])) {
                                this.attemptTrick(tricks[idx]);
                                return;
                            }
                        }
                    }
                    onDown(t.clientY);
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    onUp();
                }, { passive: false });

                canvas.addEventListener('mousedown', (e) => onDown(e.clientY));
                canvas.addEventListener('mouseup', onUp);
            }

            startCharge() {
                this.charging = true;
                this.player.state = 'charging';
                this.player.chargeTime = 0;
            }

            releaseJump() {
                this.charging = false;
                const power = Math.min(this.player.chargeTime / this.player.maxCharge, 1);
                this.player.vy = -(8 + power * 10);
                this.player.vx = (this.keys['left'] ? -3 : 0) + (this.keys['right'] ? 3 : 0);
                this.player.state = 'jumping';
                this.player.airTime = 0;
                this.player.tricksPerformed = [];
                this.player.squashX = 0.85;
                this.player.squashY = 1.15;

                // Jump dust
                for (let i = 0; i < 8; i++) {
                    this.particles.push({
                        x: this.player.x + this.player.width/2,
                        y: this.groundY,
                        vx: (Math.random()-0.5) * 5,
                        vy: -Math.random() * 3,
                        life: 1, color: 'rgba(180,160,140,0.5)',
                        size: 4 + Math.random() * 5, type: 'dust'
                    });
                }
            }

            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');

                this.state = 'playing';
                this.totalScore = 0;
                this.attemptScores = [];
                this.currentAttempt = 0;
                this.trickCount = 0;
                this.cleanLands = 0;
                this.keys = {};

                this.groundY = canvas.height - 100;
                this.setupAttempt();

                this.updateHUD();
            }

            setupAttempt() {
                this.currentAttempt++;
                this.player.state = 'ready';
                this.player.x = canvas.width * 0.2 + Math.random() * canvas.width * 0.15;
                this.player.y = this.groundY - this.player.height;
                this.player.vx = 0;
                this.player.vy = 0;
                this.player.rotation = 0;
                this.player.rotSpeed = 0;
                this.player.armAngle = 0;
                this.player.squashX = 1;
                this.player.squashY = 1;
                this.player.tricksPerformed = [];
                this.player.currentTrick = null;
                this.player.hasBall = true;
                this.player.onFire = false;
                this.player.fireTimer = 0;
                this.player.chargeTime = 0;
                this.charging = false;
                this.particles = [];
                this.landParticles = [];
                this.dunkParticles = [];

                // Hoop position – random each attempt
                this.hoopX = canvas.width * 0.5 + Math.random() * canvas.width * 0.2;
                this.hoopY = this.groundY - 180 - Math.random() * 40;

                // Ball starts with player
                this.ball.x = this.player.x + this.player.width/2 + 15;
                this.ball.y = this.player.y + 25;
                this.ball.rotation = 0;

                this.camY = 0;
                this.targetCamY = 0;
                this.screenShake = 0;

                // Reset crowd excitement
                this.crowd.forEach(c => c.excitement = Math.random() * 0.3);

                this.updateHUD();
            }

            update() {
                if (this.state !== 'playing') return;

                const p = this.player;

                // Charging
                if (this.charging && p.state === 'charging') {
                    p.chargeTime = Math.min(p.chargeTime + 16, p.maxCharge);
                    p.squashY = 1 - (p.chargeTime / p.maxCharge) * 0.2;
                    p.squashX = 1 + (p.chargeTime / p.maxCharge) * 0.15;
                }

                // Physics
                if (p.state === 'jumping' || p.state === 'dunking') {
                    p.vy += 0.55;
                    p.y += p.vy;
                    p.x += p.vx;
                    p.rotation += p.rotSpeed;

                    p.airTime++;

                    // Trick detection based on rotation & keys
                    this.detectTricks();

                    // Air control
                    if (this.keys['left']) {
                        p.vx -= 0.3;
                        p.rotSpeed -= 0.008;
                    }
                    if (this.keys['right']) {
                        p.vx += 0.3;
                        p.rotSpeed += 0.008;
                    }

                    // Touch swipe detection for tricks
                    // (handled in detectTricks via keys)

                    // Check dunk range
                    const dx = (p.x + p.width/2) - this.hoopX;
                    const dy = (p.y + p.height/2) - this.hoopY;
                    const distToHoop = Math.sqrt(dx*dx + dy*dy);

                    if (distToHoop < 60 && p.vy > 0 && p.hasBall && p.state !== 'dunking') {
                        // Automatic dunk when close
                        this.performDunk();
                    }

                    // Touchdown ground
                    if (p.y >= this.groundY - p.height) {
                        p.y = this.groundY - p.height;
                        p.vy = 0;
                        p.vx *= 0.7;
                        p.rotSpeed *= 0.9;

                        // Check landing quality
                        const landingAngle = Math.abs(p.rotation % (Math.PI * 2));
                        const isClean = landingAngle < 0.4 || landingAngle > Math.PI * 2 - 0.4;
                        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);

                        if (isClean && speed < 3) {
                            p.state = 'landing';
                            this.cleanLands++;
                        } else if (p.state !== 'landing') {
                            p.state = 'falling';
                        }

                        // Transition to landing after a moment
                        if (p.state === 'landing' || p.state === 'falling') {
                            p.squashY = 0.7;
                            p.squashX = 1.3;

                            this.landParticles.push({
                                x: p.x + p.width/2, y: this.groundY,
                                life: 1, vx: 0, vy: 0, size: 20
                            });

                            // End attempt after landing
                            setTimeout(() => this.endAttempt(), 1200);
                            p.state = 'done';
                        }
                    }

                    // Out of bounds (fell off screen)
                    if (p.y > canvas.height + 100) {
                        this.endAttempt();
                        p.state = 'done';
                    }
                }

                // Squash recovery
                p.squashX += (1 - p.squashX) * 0.12;
                p.squashY += (1 - p.squashY) * 0.12;

                // Camera follows player up
                if (p.y < this.groundY - 200) {
                    this.targetCamY = Math.min(p.y - (this.groundY - 250), 0);
                } else {
                    this.targetCamY = 0;
                }
                this.camY += (this.targetCamY - this.camY) * 0.05;

                // Screen shake decay
                this.screenShake *= 0.9;
                if (this.screenShake < 0.3) this.screenShake = 0;

                // Ball follows player
                if (p.hasBall) {
                    this.ball.x = p.x + p.width/2 + Math.sin(p.armAngle) * 15;
                    this.ball.y = p.y + 20;
                    this.ball.rotation += 0.1;
                } else {
                    // In-hoop physics (swishing)
                    this.ball.y += 2;
                    this.ball.x += Math.sin(this.ball.y * 0.1) * 0.5;
                    if (this.ball.y > this.groundY) {
                        this.ball.y = this.groundY + 50; // drop below
                    }
                }

                // Fire timer
                if (p.onFire) {
                    p.fireTimer--;
                    if (p.fireTimer <= 0) p.onFire = false;
                }

                // Particles
                this.particles = this.particles.filter(pt => {
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    if (pt.type === 'dust') { pt.vy += 0.1; pt.life -= 0.03; }
                    else if (pt.type === 'spark') { pt.vy += 0.15; pt.life -= 0.025; }
                    else if (pt.type === 'fire') { pt.vy -= 0.05; pt.life -= 0.02; pt.x += Math.sin(pt.life * 10) * 0.5; }
                    else if (pt.type === 'star') { pt.life -= 0.015; pt.y -= 1; }
                    else { pt.life -= 0.02; }
                    return pt.life > 0;
                });

                // Crowd excitement
                this.crowd.forEach(c => {
                    if (p.state === 'dunking' || p.tricksPerformed.length > 0) {
                        c.excitement = Math.min(c.excitement + 0.02, 1);
                    } else {
                        c.excitement *= 0.995;
                    }
                });
            }

            detectTricks() {
                const p = this.player;

                // Check accumulated rotation for spin tricks
                const totalRotation = Math.abs(p.rotation);

                // Left/Right keys during air = direction tricks
                if (this.keys[''] && !this.keys['right']) {
                    // Flying left - could be reverse or 360 start
                }
                if (this.keys['right'] && !this.keys['left']) {
                    // Flying right
                }

                // Check for full rotation (360)
                if (totalRotation > Math.PI * 2 && !p.tricksPerformed.includes('spin360')) {
                    p.tricksPerformed.push('spin360');
                    this.awardTrick('spin360');
                    p.rotation = 0; // reset for next spin
                }

                // Between legs (quick left-right-left or tap pattern)
                // Detected by rapid key changes (handled in key events for mobile simplicity)
                // For now, swipe-based: we use a trick queue

                // Distance-based trick (free throw line)
                const distToHoop = Math.abs((p.x + p.width/2) - this.hoopX);
                if (distToHoop > canvas.width * 0.25 && !p.tricksPerformed.includes('freethrow')) {
                    p.tricksPerformed.push('freethrow');
                    this.awardTrick('freethrow');
                }
            }

            // Called from input for mobile trick buttons
            attemptTrick(trickKey) {
                const p = this.player;
                if (p.state !== 'jumping' && p.state !== 'dunking') return;
                if (p.tricksPerformed.includes(trickKey) || p.tricksPerformed.length >= 3) return;

                p.tricksPerformed.push(trickKey);
                this.awardTrick(trickKey);
            }

            awardTrick(key) {
                const trick = TRICKS.find(t => t.key === key);
                if (!trick) return;

                const p = this.player;
                p.currentTrick = trick;
                this.trickCount++;

                // Visual feedback
                this.showTrickPopup(`${trick.icon} ${trick.name}!`);

                // Particles
                for (let i = 0; i < 15; i++) {
                    this.particles.push({
                        x: p.x + p.width/2,
                        y: p.y + p.height/2,
                        vx: (Math.random()-0.5) * 10,
                        vy: -Math.random() * 8,
                        life: 1,
                        color: '#F2722C',
                        size: 3 + Math.random() * 6,
                        type: 'star'
                    });
                }

                // Fire streak
                if (this.attemptScores.length >= 2 && this.attemptScores[this.attemptScores.length-1] > 50) {
                    p.onFire = true;
                    p.fireTimer = 300;
                    this.showTrickPopup('🔥 ON FIRE!');
                }

                // Crowd goes wild
                this.crowd.forEach(c => { c.excitement = Math.min(c.excitement + 0.3, 1); });
            }

            performDunk() {
                const p = this.player;
                if (!p.hasBall || p.state === 'dunking') return;

                p.state = 'dunking';
                p.hasBall = false;
                p.vy = 3; // Slam down
                p.rotSpeed *= 0.3;

                // Massive dunk particles
                for (let i = 0; i < 30; i++) {
                    this.particles.push({
                        x: this.hoopX + (Math.random()-0.5) * 40,
                        y: this.hoopY,
                        vx: (Math.random()-0.5) * 12,
                        vy: Math.random() * 4,
                        life: 1,
                        color: i % 3 === 0 ? '#F2722C' : (i % 3 === 1 ? '#7457A3' : '#fbbf24'),
                        size: 4 + Math.random() * 8,
                        type: 'spark'
                    });
                }

                this.screenShake = 15;

                // Ball through hoop
                this.ball.x = this.hoopX;
                this.ball.y = this.hoopY;

                // Net particles
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: this.hoopX + (Math.random()-0.5) * 30,
                        y: this.hoopY + 10,
                        vx: (Math.random()-0.5) * 3,
                        vy: 1 + Math.random() * 2,
                        life: 1.5,
                        color: '#ffffff',
                        size: 2 + Math.random() * 3,
                        type: 'spark'
                    });
                }

                // Crowd explodes
                this.crowd.forEach(c => c.excitement = 1);

                // Show popup
                this.showTrickPopup('💥 SLAM DUNK!');
            }

            showTrickPopup(text) {
                const popup = document.getElementById('trickPopup');
                popup.textContent = text;
                popup.classList.remove('show');
                void popup.offsetWidth;
                popup.classList.add('show');
            }

            endAttempt() {
                // Calculate score for this attempt
                const p = this.player;
                let score = 0;
                let gradePoints = 0;

                // Base dunk score
                if (!p.hasBall && p.state !== 'falling') {
                    score += 20;
                    gradePoints += 20;
                }

                // Trick bonuses
                p.tricksPerformed.forEach(key => {
                    const trick = TRICKS.find(t => t.key === key);
                    if (trick) {
                        score += trick.points;
                        gradePoints += trick.points;
                    }
                });

                // Combo bonus (multiple tricks)
                if (p.tricksPerformed.length >= 2) {
                    score += p.tricksPerformed.length * 15;
                }

                // Clean landing bonus
                if (this.cleanLands > 0) {
                    score += 10;
                }

                // Fire bonus
                if (p.onFire) {
                    score = Math.floor(score * 1.5);
                }

                // Style points (air time)
                score += Math.min(p.airTime * 0.1, 15);

                // Height bonus (how high did they go)
                const maxHeight = this.groundY - Math.min(p.y, this.groundY);
                score += Math.min(maxHeight * 0.1, 10);

                score = Math.floor(score);
                if (score < 0) score = 0;

                this.attemptScores.push(score);
                this.totalScore += score;
                this.bestCombo = Math.max(this.bestCombo, score);

                // Show result screen
                this.showAttemptResult(score, gradePoints, p.tricksPerformed);
            }

            showAttemptResult(score, gradePoints, tricks) {
                this.state = 'result';
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('resultScreen').classList.remove('hidden');
                document.getElementById('resultAttempt').textContent = `${this.currentAttempt}/${this.maxAttempts}`;
                document.getElementById('attemptScore').textContent = score;

                // Stars
                const starCount = score >= 80 ? 5 : score >= 60 ? 4 : score >= 40 ? 3 : score >= 20 ? 2 : score > 0 ? 1 : 0;
                for (let i = 1; i <= 5; i++) {
                    const el = document.getElementById(`star${i}`);
                    el.classList.remove('lit');
                }
                setTimeout(() => {
                    for (let i = 1; i <= starCount; i++) {
                        setTimeout(() => {
                            document.getElementById(`star${i}`).classList.add('lit');
                        }, i * 200);
                    }
                }, 300);

                // Trick summary
                const trickText = tricks.length > 0
                    ? tricks.map(k => { const t = TRICKS.find(x => x.key === k); return t ? `${t.icon} ${t.name}` : k; }).join(' + ')
                    : 'Kein Trick';
                document.getElementById('attemptTrick').textContent = trickText;

                // Update button text
                const nextBtn = document.getElementById('nextBtn');
                if (this.currentAttempt >= this.maxAttempts) {
                    nextBtn.textContent = 'ERGEBNIS SEHEN';
                    nextBtn.onclick = () => this.showFinalResults();
                } else {
                    nextBtn.textContent = 'NÄCHSTER VERSUCH';
                    nextBtn.onclick = () => this.nextAttempt();
                }
            }

            nextAttempt() {
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                this.state = 'playing';
                this.setupAttempt();
            }

            showFinalResults() {
                this.state = 'gameover';
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.remove('hidden');

                const isNewRecord = this.totalScore > this.highscore;
                if (isNewRecord) {
                    this.highscore = this.totalScore;
                    document.getElementById('newRecordLabel').classList.remove('hidden');
                } else {
                    document.getElementById('newRecordLabel').classList.add('hidden');
                }

                document.getElementById('finalScore').textContent = this.totalScore;
                document.getElementById('statTricks').textContent = this.trickCount;
                document.getElementById('statBest').textContent = this.bestCombo;
                document.getElementById('statLands').textContent = this.cleanLands;

                // Final stars
                const avgScore = this.totalScore / this.maxAttempts;
                const starCount = avgScore >= 70 ? 5 : avgScore >= 55 ? 4 : avgScore >= 40 ? 3 : avgScore >= 25 ? 2 : 1;
                const stars = document.querySelectorAll('#finalStars .star');
                stars.forEach((s,i) => {
                    s.classList.remove('lit');
                    if (i < starCount) {
                        setTimeout(() => s.classList.add('lit'), i * 200);
                    }
                });

                // Grade
                const gradeEl = document.getElementById('finalGrade');
                let grade, gradeClass;
                if (avgScore >= 70) { grade = 'A'; gradeClass = 'grade-A'; }
                else if (avgScore >= 55) { grade = 'B'; gradeClass = 'grade-B'; }
                else if (avgScore >= 40) { grade = 'C'; gradeClass = 'grade-C'; }
                else if (avgScore >= 25) { grade = 'D'; gradeClass = 'grade-D'; }
                else { grade = 'F'; gradeClass = 'grade-F'; }
                gradeEl.textContent = grade;
                gradeEl.className = `grade-display ${gradeClass}`;
            }

            shareScore() {
                const text = `🏀 NBC Dunk Contest\n${this.totalScore} Punkte | Note: ${document.getElementById('finalGrade').textContent}\n${this.tricksPerformed ? '' : ''}\nKannst du das schlagen?`;
                if (navigator.share) {
                    navigator.share({ title: 'NBC Dunk Contest', text: text, url: window.location.href });
                } else {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('Ergebnis kopiert! Teile es in den Sozialen Medien 🏀');
                    });
                }
            }

            showLeaderboard() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.remove('hidden');
                renderLeaderboard();
            }

            hideLeaderboard() {
                document.getElementById('leaderboardScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
            }

            showMenu() {
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('startScreen').remove('hidden');
                this.state = 'menu';
            }

            updateHUD() {
                document.getElementById('hudScore').textContent = this.totalScore;
                document.getElementById('hudAttempt').textContent = `${this.currentAttempt}/${this.maxAttempts}`;
            }

            // ── DRAW ──
            draw() {
                ctx.save();

                // Screen shake
                if (this.screenShake > 0) {
                    ctx.translate(
                        (Math.random()-0.5) * this.screenShake,
                        (Math.random()-0.5) * this.screenShake
                    );
                }

                const camY = this.camY;

                // Sky
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height + camY);
                skyGrad.addColorStop(0, '#050510');
                skyGrad.addColorStop(0.3, '#0a0a1a');
                skyGrad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Stars
                for (let i = 0; i < 60; i++) {
                    const sx = (i * 73 + 30) % canvas.width;
                    const sy = (i * 37 + 10) % 200;
                    ctx.fillStyle = `rgba(255,255,255,${0.1 + (i%4)*0.1})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy + camY * 0.3, 0.5 + (i%3)*0.5, 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.save();
                ctx.translate(0, camY);

                // Arena back wall
                ctx.fillStyle = '#111827';
                ctx.fillRect(0, 50 + camY * 0.2, canvas.width, this.groundY - 50 - camY*0.2);

                // Wall pattern
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 1;
                for (let wy = 80; wy < this.groundY; wy += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, wy + camY * 0.15);
                    ctx.lineTo(canvas.width, wy + camY * 0.15);
                    ctx.stroke();
                }

                // ─── CROWD ───
                this.crowd.forEach(c => {
                    const cx = (c.x / 100) * canvas.width;
                    const cy = this.groundY - 80 - c.y + Math.sin(Date.now() * 0.005 + c.animOffset) * c.excitement * 8;

                    // Head
                    ctx.fillStyle = c.color;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 3 + c.excitement * 2, 0, Math.PI*2);
                    ctx.fill();

                    // Body
                    ctx.fillStyle = c.color;
                    ctx.fillRect(cx-2, cy+3, 4, 6);

                    // Arms up when excited
                    if (c.excitement > 0.5) {
                        ctx.strokeStyle = c.color;
                        ctx.lineWidth = 1.5;
                        const armY = cy + 4 - c.excitement * 8;
                        ctx.beginPath(); ctx.moveTo(cx-2, cy+6); ctx.lineTo(cx-6, armY); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(cx+2, cy+6); ctx.lineTo(cx+6, armY); ctx.stroke();
                    }
                });

                // ─── HOOP ───
                this.drawHoop();

                // ─── PLAYER ───
                this.drawPlayer();

                // ─── BALL ───
                this.drawBall();

                // ─── LANDING INDICATOR ───
                if (this.player.state === 'ready' || this.player.state === 'charging') {
                    ctx.strokeStyle = this.charging ? `rgba(242,114,44,${0.5 + this.player.chargeTime/this.player.maxCharge*0.5})` : 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(this.player.x + this.player.width/2, this.groundY);
                    ctx.lineTo(this.hoopX, this.hoopY);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Power indicator
                    if (this.charging) {
                        const power = this.player.chargeTime / this.player.maxCharge;
                        ctx.fillStyle = `rgba(242,114,44,${power})`;
                        ctx.fillRect(this.player.x, this.player.y - 12, this.player.width * power, 6);
                        ctx.strokeStyle = '#F2722C';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(this.player.x, this.player.y - 12, this.player.width, 6);
                    }
                }

                // ─── PARTICLES ───
                this.particles.forEach(p => {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    if (p.type === 'star') {
                        this.drawStar(p.x, p.y, 5, p.size * p.life, p.size * 0.5 * p.life);
                    } else {
                        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                    }
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // ─── TRICK BUTTONS (mobile, during air) ───
                if (this.player.state === 'jumping' || this.player.state === 'dunking') {
                    this.drawTrickButtons();
                }

                ctx.restore(); // camY

                // ─── CHARGE UI (screen space) ───
                if (this.charging) {
                    const power = this.player.chargeTime / this.player.maxCharge;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(canvas.width/2 - 60, canvas.height - 50, 120, 16);
                    const grad = ctx.createLinearGradient(canvas.width/2-60, 0, canvas.width/2+60, 0);
                    grad.addColorStop(0, '#F2722C');
                    grad.addColorStop(1, power > 0.8 ? '#2ecc71' : '#7457A3');
                    ctx.fillStyle = grad;
                    ctx.fillRect(canvas.width/2 - 58, canvas.height - 48, 116 * power, 12);

                    ctx.fillStyle = '#fff';
                    ctx.font = '10px Oswald';
                    ctx.textAlign = 'center';
                    ctx.fillText(power > 0.8 ? '⚡ MAX POWER!' : 'HALTE...', canvas.width/2, canvas.height - 54);
                }

                ctx.restore(); // shake
            }

            drawStar(cx, cy, spikes, outerR, innerR) {
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerR);
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
                    rot += step;
                    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
                    rot += step;
                }
                ctx.lineTo(cx, cy - outerR);
                ctx.closePath();
            }

            drawHoop() {
                const hx = this.hoopX, hy = this.hoopY;

                // Backboard
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillRect(hx - 50, hy - 70, 100, 70);
                ctx.strokeStyle = '#F2722C';
                ctx.lineWidth = 3;
                ctx.strokeRect(hx - 50, hy - 70, 100, 70);

                // Backboard square
                ctx.strokeStyle = '#F2722C';
                ctx.lineWidth = 2;
                ctx.strokeRect(hx - 25, hy - 45, 50, 35);

                // Pole
                ctx.fillStyle = '#555';
                ctx.fillRect(hx - 5, hy - 70, 10, -30);

                // Rim
                ctx.strokeStyle = '#F2722C';
                ctx.lineWidth = 5;
                ctx.shadowColor = '#F2722C';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(hx - 35, hy);
                ctx.lineTo(hx + 35, hy);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Net
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1.5;
                const netSegments = 8;
                const netDepth = 45;
                for (let i = 0; i <= netSegments; i++) {
                    const nx = hx - 35 + (70 / netSegments) * i;
                    ctx.beginPath();
                    ctx.moveTo(nx, hy);
                    ctx.quadraticCurveTo(
                        hx + (nx - hx) * 0.3,
                        hy + netDepth * 0.6,
                        hx + (nx - hx) * 0.1,
                        hy + netDepth
                    );
                    ctx.stroke();
                }
                // Horizontal net lines
                for (let j = 1; j <= 3; j++) {
                    const ny = hy + (netDepth / 4) * j;
                    const spread = 35 * (1 - j * 0.2);
                    ctx.beginPath();
                    ctx.moveTo(hx - spread * 0.8, ny);
                    ctx.lineTo(hx + spread * 0.8, ny);
                    ctx.stroke();
                }
            }

            drawPlayer() {
                const p = this.player;
                if (p.state === 'done') return;

                ctx.save();
                ctx.translate(p.x + p.width/2, p.y + p.height);
                ctx.scale(p.squashX, p.squashY);
                ctx.rotate(p.rotation);
                ctx.translate(-p.width/2, -p.height);

                // Fire aura
                if (p.onFire) {
                    ctx.shadowColor = '#F2722C';
                    ctx.shadowBlur = 25;
                    for (let i = 0; i < 5; i++) {
                        ctx.fillStyle = `rgba(242,114,44,${0.1 - i*0.015})`;
                        ctx.beginPath();
                        ctx.ellipse(p.width/2, p.height/2, p.width/2 + 8 + i*3, p.height/2 + 8 + i*3, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                }

                // Shadow on ground
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(p.width/2, 2, p.width*0.4, 5, 0, 0, Math.PI*2);
                ctx.fill();

                // Legs
                const legAnim = (p.state === 'jumping' || p.state === 'dunking') ? 12 : (Math.sin(Date.now()*0.01)*3);
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(p.width*0.35, p.height*0.55); ctx.lineTo(p.width*0.3-legAnim, p.height*0.95); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.width*0.65, p.height*0.55); ctx.lineTo(p.width*0.7+legAnim, p.height*0.95); ctx.stroke();

                // Shoes
                ctx.fillStyle = '#F2722C';
                ctx.beginPath(); ctx.ellipse(p.width*0.3-legAnim, p.height*0.97, 8, 4, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(p.width*0.7+legAnim, p.height*0.97, 8, 4, 0, 0, Math.PI*2); ctx.fill();

                // Body
                ctx.fillStyle = p.onFire ? '#ff6b35' : '#F2722C';
                ctx.beginPath();
                ctx.roundRect(p.width*0.18, p.height*0.15, p.width*0.64, p.height*0.42, 6);
                ctx.fill();

                // Jersey text
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Oswald';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('NBC', p.width/2, p.height*0.33);

                // Arms
                ctx.strokeStyle = '#f0c090';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                if (p.state === 'dunking') {
                    // Arm extended up and toward hoop
                    ctx.beginPath(); ctx.moveTo(p.width*0.5, p.height*0.25); ctx.lineTo(p.width*0.5, -10); ctx.stroke();
                } else if (p.state === 'jumping') {
                    ctx.beginPath(); ctx.moveTo(p.width*0.2, p.height*0.3); ctx.lineTo(p.width*0.05, p.height*0.1); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(p.width*0.8, p.height*0.3); ctx.lineTo(p.width*0.95, p.height*0.1); ctx.stroke();
                } else {
                    const armSwing = (p.state === 'charging') ? (this.charging ? Math.sin(Date.now()*0.01)*5 : 0) : 0;
                    ctx.beginPath(); ctx.moveTo(p.width*0.2, p.height*0.3); ctx.lineTo(p.width*0.1+armSwing, p.height*0.5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(p.width*0.8, p.height*0.3); ctx.lineTo(p.width*0.9-armSwing, p.height*0.5); ctx.stroke();
                }

                // Head
                ctx.fillStyle = '#f0c090';
                ctx.beginPath();
                ctx.arc(p.width/2, p.height*0.1, 12, 0, Math.PI*2);
                ctx.fill();

                // Hair
                ctx.fillStyle = '#4a3728';
                ctx.beginPath();
                ctx.arc(p.width/2, p.height*0.06, 10, Math.PI, Math.PI*2);
                ctx.fill();

                // Headband
                ctx.fillStyle = '#F2722C';
                ctx.fillRect(p.width/2-10, p.height*0.02, 20, 4);

                // Eyes
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath(); ctx.arc(p.width/2-4, p.height*0.08, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(p.width/2+4, p.height*0.08, 2, 0, Math.PI*2); ctx.fill();

                // Expression
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 1.5;
                if (p.state === 'charging') {
                    // Determined - gritting teeth
                    ctx.beginPath(); ctx.arc(p.width/2, p.height*0.14, 4, 0.2, Math.PI-0.2); ctx.stroke();
                } else if (p.state === 'jumping' || p.state === 'dunking') {
                    // Focused
                    ctx.beginPath(); ctx.moveTo(p.width/2-3, p.height*0.13); ctx.lineTo(p.width/2+3, p.height*0.13); ctx.stroke();
                } else {
                    // Smile
                    ctx.beginPath(); ctx.arc(p.width/2, p.height*0.12, 4, 0.1, Math.PI-0.1); ctx.stroke();
                }

                ctx.restore();
            }

            drawBall() {
                const bx = this.ball.x, by = this.ball.y, br = this.ball.radius;

                ctx.save();
                ctx.translate(bx, by);
                ctx.rotate(this.ball.rotation);

                // Glow
                ctx.shadowColor = '#F2722C';
                ctx.shadowBlur = 10;

                // Body
                const grad = ctx.createRadialGradient(-3, -3, 0, 0, 0, br);
                grad.addColorStop(0, '#ffad33');
                grad.addColorStop(1, '#d35400');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, br, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Lines
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, br-2, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-br+3, 0); ctx.lineTo(br-3, 0); ctx.stroke();

                ctx.restore();
            }

            drawTrickButtons() {
                const tricks = ['windmill', 'betweenlegs', 'tomahawk', 'reverse'];
                const labels = ['🌪️', '🦵', '🪓', '↩️'];
                const btnW = 56, btnH = 56;
                const gap = 10;
                const totalW = tricks.length * btnW + (tricks.length - 1) * gap;
                const startX = (canvas.width - totalW) / 2;
                const y = canvas.height - 80;

                tricks.forEach((key, i) => {
                    const x = startX + i * (btnW + gap);
                    const used = this.player.tricksPerformed.includes(key);

                    ctx.globalAlpha = used ? 0.3 : 0.85;
                    ctx.fillStyle = used ? '#333' : 'rgba(242,114,44,0.25)';
                    ctx.strokeStyle = used ? '#555' : '#F2722C';
                    ctx.lineWidth = 2;

                    ctx.beginPath();
                    ctx.roundRect(x, y, btnW, btnH, 12);
                    ctx.fill();
                    ctx.stroke();

                    ctx.globalAlpha = 1;
                    ctx.font = '24px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(labels[i], x + btnW/2, y + btnH/2);
                });
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new DunkContest();
    </script>
