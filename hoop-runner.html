<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Hoop Runner | NBC Baskets Nordhorn</title>
<link rel="icon" href="../nbc/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;z-index:10}
#ui>*{pointer-events:auto}
.screen{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:28px 24px;background:rgba(15,23,42,.92);border-radius:20px;border:2px solid #f97316;box-shadow:0 0 60px rgba(249,115,22,.25),0 0 120px rgba(0,0,0,.5);min-width:300px;max-width:92vw;backdrop-filter:blur(10px)}
.screen h1{font-size:1.8em;color:#f97316;text-shadow:0 0 30px rgba(249,115,22,.4);line-height:1.2}
.screen h2{font-size:1.1em;color:#fb923c;font-weight:600}
.screen p{font-size:.82em;color:#94a3b8;line-height:1.6}
.btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:16px 40px;font-size:1.05em;font-weight:700;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;text-transform:uppercase;letter-spacing:1px;width:100%;max-width:260px}
.btn:active{transform:scale(.95);box-shadow:none}
.btn-sec{background:rgba(249,115,22,.12);color:#fb923c;border:2px solid rgba(249,115,22,.5);padding:12px 32px;font-size:.85em;font-weight:600;border-radius:12px;cursor:pointer;width:100%;max-width:260px}
.btn-sec:active{background:rgba(249,115,22,.25)}
input[type=text]{padding:14px 20px;border-radius:12px;border:2px solid rgba(249,115,22,.5);background:rgba(0,0,0,.5);color:#fff;font-size:1em;font-weight:600;text-align:center;outline:none;width:100%;max-width:260px}
input[type=text]:focus{border-color:#f97316;box-shadow:0 0 16px rgba(249,115,22,.3)}
input[type=text]::placeholder{color:#64748b}
#leaderboard{display:flex;flex-direction:column;gap:4px;width:100%;max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-radius:10px;font-size:.85em;font-weight:600}
.lb-row:nth-child(1){background:linear-gradient(90deg,rgba(255,215,0,.15),transparent);color:#ffd700}
.lb-row:nth-child(2){background:linear-gradient(90deg,rgba(192,192,192,.1),transparent);color:#c0c0c0}
.lb-row:nth-child(3){background:linear-gradient(90deg,rgba(205,127,50,.1),transparent);color:#cd7f32}
.lb-row:nth-child(n+4){background:rgba(255,255,255,.03);color:#64748b}
.hud{position:fixed;top:0;left:0;width:100%;padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 0 max(14px,env(safe-area-inset-left));display:none;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5}
.hud-left{display:flex;flex-direction:column;gap:2px}
.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.hud .score{font-size:1.6em;font-weight:800;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.4)}
.hud .dist{font-size:.95em;font-weight:600;color:#fb923c;opacity:.9}
.hud .combo{font-size:1.2em;font-weight:800;color:#22d3ee;text-shadow:0 0 16px rgba(34,211,238,.5);animation:comboPulse .3s ease infinite alternate}
@keyframes comboPulse{from{opacity:.7;transform:scale(.95)}to{opacity:1;transform:scale(1.05)}}
.hud .speed-bar{width:80px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.hud .speed-fill{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);border-radius:2px;transition:width .3s}
.touch-zones{position:fixed;bottom:0;left:0;width:100%;height:45%;display:none;z-index:4;pointer-events:none}
.touch-hint{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);font-size:.7em;font-weight:600;text-align:center;pointer-events:none;z-index:6;display:none;white-space:nowrap}
.home-link{position:fixed;left:12px;bottom:max(12px,env(safe-area-inset-bottom));z-index:20;padding:8px 14px;border-radius:999px;background:rgba(15,23,42,.85);border:1px solid rgba(249,115,22,.5);color:#94a3b8;text-decoration:none;font:600 11px -apple-system,sans-serif}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="ui">
  <div id="menu" class="screen">
    <div style="font-size:2.5em">🏀</div>
    <h1>HOOP RUNNER</h1>
    <h2>NBC Baskets Nordhorn</h2>
    <p>Weiche den Gegenspielern aus!<br>Sammle Punkte & zeig dein Können!</p>
    <input type="text" id="playerName" placeholder="Dein Name" maxlength="12" autocomplete="off" autocapitalize="off">
    <button class="btn" id="playBtn">▶ START</button>
    <button class="btn-sec" id="lbBtn">🏆 Bestenliste</button>
  </div>

  <div id="gameover" class="screen hidden">
    <h1>RUN VORBEI!</h1>
    <div id="finalScore" style="font-size:2.4em;font-weight:800;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.4)">0</div>
    <div id="finalDist" style="font-size:1.1em;font-weight:600;color:#fb923c">0 m</div>
    <div id="finalCombo" style="font-size:.95em;color:#22d3ee">Bestes Combo: x0</div>
    <div id="newHigh" style="color:#22c55e;font-size:1em;font-weight:700;display:none">🎉 NEUER HIGHSCORE!</div>
    <button class="btn" id="retryBtn">▶ NOCHMAL</button>
    <button class="btn-sec" id="menuBtn">🏠 MENÜ</button>
  </div>

  <div id="leaderboardScreen" class="screen hidden">
    <h2>🏆 BESTENLISTE</h2>
    <div id="leaderboard"></div>
    <button class="btn-sec" id="lbBack">← ZURÜCK</button>
  </div>
</div>

<div id="hud" class="hud">
  <div class="hud-left">
    <div class="score" id="hScore">0</div>
    <div class="dist" id="hDist">0 m</div>
  </div>
  <div class="hud-right">
    <div class="combo" id="hCombo" style="display:none">COMBO x2</div>
    <div class="speed-bar"><div class="speed-fill" id="hSpeed" style="width:30%"></div></div>
  </div>
</div>

<div class="touch-hint" id="touchHint">← Wische links/rechts → | Oben: Springen | Unten: Rutschen</div>
<a class="home-link" href="../nbc/index.html">← NBC</a>

<script>
const $=id=>document.getElementById(id);
const canvas=$('gc');
const ctx=canvas.getContext('2d');

// ===== RESIZE =====
let W,H;
function resize(){
  const dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener('resize',resize);

// ===== CONSTANTS =====
const LANES=3;
const PLAYER_Y=.78;
const HORIZON_Y=.32;
const BASE_SPEED=260;
const MAX_SPEED=580;
const JUMP_VEL=-560;
const GRAVETY=1500;
const SLIDE_DUR=.5;
const INVINCIBLE_DUR=1.2;
const PT=[10,25,50];
const COMBO_WINDOW=2;

// ===== STATE =====
let state='menu',gameSpeed,dist,score,combo,comboTimer,maxCombo;
let player,obstacles,collectibles,particles,floats;
let spawnT,spawnI,invT,lastTime,playerName='Player';
let shakeT=0;
let touchStart=null;
let touchStartTime=0;
let isPortrait=true;

// ===== HELPERS =====
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,l,h)=>Math.max(l,Math.min(h,v));
const rand=(a,b)=>a+Math.random()*(b-a);

function laneX(lane){
  const rw=W*.72,rx=(W-rw)/2,lw=rw/LANES;
  return rx+laneW*lane+lw*.5;
}
function laneW(){return W*.72/LANES}

function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

// ===== PLAYER =====
class Player{
  constructor(){
    this.lane=1;this.tLane=1;this.x=laneX(1);
    this.y=H*PLAYER_Y;this.w=38;this.h=58;
    this.vy=0;this.jumping=false;this.sliding=false;
    this.slideT=0;this.hScale=1;this.animF=0;this.animT=0;
  }
  update(dt){
    const tx=laneX(this.tLane),d=tx-this.x;
    this.x+=d>2?d*10*dt:d<-2?d*10*dt:(this.x=tx,this.lane=this.tLane,this.x);
    if(this.jumping){
      this.vy+=GRAVETY*dt;this.y+=this.vy*dt;
      if(this.y>=H*PLAYER_Y){this.y=H*PLAYER_Y;this.vy=0;this.jumping=false}
    }
    if(this.sliding){
      this.slideT-=dt;this.hScale=lerp(this.hScale,.4,12*dt);
      if(this.slideT<=0){this.sliding=false;this.hScale=1}
    } else this.hScale=lerp(this.hScale,1,10*dt);
    this.animT+=dt;
    if(this.animT>.1){this.animT=0;this.animF=(this.animF+1)%4}
  }
  jump(){if(!this.jumping&&!this.sliding){this.jumping=true;this.vy=JUMP_VEL}}
  slide(){if(!this.jumping&&!this.sliding){this.sliding=true;this.slideT=SLIDE_DUR}}
  left(){if(this.tLane>0)this.tLane--}
  right(){if(this.tLane<2)this.tLane++}
  draw(){
    const s=ctx,hx=this.x,hy=this.y,hw=this.w/2,hh=this.h*this.hScale;
    const by=hy-hh;
    // shadow
    s.fillStyle='rgba(0,0,0,.25)';
    s.beginPath();s.ellipse(hy>0?hx:0,hy+2,hw*.7,5,0,0,Math.PI*2);s.fill();
    // jersey
    const jc=['#f97316','#3b82f6','#22c55e','#ef4444','#a855f7'];
    s.fillStyle=jc[Math.abs(hx*7|0)%jc.length];
    s.beginPath();s.roundRect(hx-hw*.6,by+hh*.25,hw*1.2,hh*.45,4);s.fill();
    // shorts
    s.fillStyle='#1e293b';
    s.beginPath();s.roundRect(hx-hw*.55,by+hh*.65,hw*1.1,hh*.25,3);s.fill();
    // head
    s.fillStyle='#d4a574';
    s.beginPath();s.arc(hx,by+hh*.12,hw*.45,0,Math.PI*2);s.fill();
    s.fillStyle='#1a1a1a';
    s.beginPath();s.arc(hx,by+hh*.06,hw*.42,Math.PI,Math.PI*2);s.fill();
    // legs
    const lo=Math.sin(this.animF*Math.PI/2)*8*this.hScale;
    s.fillStyle='#d4a574';
    s.fillRect(hx-hw*.35,by+hh*.88,hw*.25,hh*.12+lo);
    s.fillRect(hx+hw*.1,by+hh*.88,hw*.25,hh*.12-lo);
    // shoes
    s.fillStyle='#fff';
    s.fillRect(hx-hw*.38,by+hh*.95+lo,hw*.3,hh*.06);
    s.fillRect(hx+hw*.08,by+hh*.95-lo,hw*.3,hh*.06);
    // ball
    const bx=hx+hw*.75,by2=by+hh*.35+Math.sin(performance.now()*.008)*8;
    s.fillStyle='#f97316';s.beginPath();s.arc(bx,by2,6,0,Math.PI*2);s.fill();
    s.strokeStyle='#c2410c';s.lineWidth=1;
    s.beginPath();s.arc(bx,by2,6,0,Math.PI*2);s.stroke();
    s.beginPath();s.moveTo(bx-6,by2);s.lineTo(bx+6,by2);s.stroke();
    // invincible
    if(invT>0){
      s.strokeStyle=`rgba(34,211,238,${.4+.4*Math.sin(Date.now()*.008)})`;
      s.lineWidth=2.5;
      s.beginPath();s.arc(hx,by+hh*.4,hw*1.3,0,Math.PI*2);s.stroke();
    }
  }
  hitbox(){
    return{x:this.x-this.w*.35,y:this.y-this.h*this.hScale,w:this.w*.7,h:this.h*this.hScale*.9}
  }
}

// ===== OBSTACLE =====
class Obs{
  constructor(lane,z,type){this.lane=lane;this.z=z;this.type=type;this.hit=false;this.w=42;this.h=type===2?28:56}
  scale(){return lerp(.12,1,clamp(this.z,0,1))}
  pos(){
    const t=clamp(this.z,0,1);
    return{x:laneX(this.lane),y:lerp(H*HORIZON_Y,H*PLAYER_Y,t),s:this.scale()}
  }
  update(dt){this.z-=gameSpeed*dt*.00075}
  draw(){
    const p=this.pos(),s=p.scale(),w=this.w*s,h=this.h*s;
    if(this.type===2){
      ctx.fillStyle='#f97316';
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-w*.3,p.y-h);ctx.lineTo(p.x+w*.3,p.y-h);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(p.x-w*.18,p.y-h*.6,w*.36,h*.12);
    }else{
      const c=['#dc2626','#2563eb','#16a34a','#9333ea'];
      ctx.fillStyle=c[this.lane%4];
      ctx.beginPath();ctx.roundRect(p.x-w*.4,p.y-h*.5,w*.8,h*.55,3*s);ctx.fill();
      ctx.fillStyle='#d4a574';
      ctx.beginPath();ctx.arc(p.x,p.y-h*.65,w*.25,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#d4a574';ctx.lineWidth=2.5*s;
      ctx.beginPath();ctx.moveTo(p.x-w*.6,p.y-h*.35);ctx.lineTo(p.x+w*.6,p.y-h*.35);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(10*s)}px sans-serif`;ctx.textAlign='center';
      ctx.fillText(this.lane+21,p.x,p.y-h*.22);
    }
  }
  hitbox(){
    const p=this.pos(),s=p.scale();
    return{x:p.x-this.w*s*.35,y:p.y-this.h*s,w:this.w*s*.7,h:this.h*s*.85}
  }
  alive(){return this.z>-.03}
}

// ===== COLLECTIBLE =====
class Col{
  constructor(lane,z,type){this.lane=lane;this.z=z;this.type=type;this.got=false;this.bob=Math.random()*6}
  scale(){return lerp(.12,1,clamp(this.z,0,1))}
  pos(){
    const t=clamp(this.z,0,1);
    return{x:laneX(this.lane),y:lerp(H*HORIZON_Y,H*PLAYER_Y-18,t),s:this.scale()}
  }
  update(dt){this.z-=gameSpeed*dt*.00075;this.bob+=dt*3}
  draw(){
    if(this.got)return;
    const p=this.pos(),s=p.scale(),r=11*s,b=Math.sin(this.bob)*3*s,y=p.y-r+b;
    const colors=['#f97316','#3b82f6','#ffd700'],labels=['2','3','★'];
    ctx.fillStyle=colors[this.type];
    ctx.beginPath();ctx.arc(p.x,y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this.type===2?'#000':'#fff';
    ctx.font=`bold ${Math.round(9*s)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(labels[this.type],p.x,y);
    // glow
    ctx.fillStyle=`rgba(255,215,0,${.12+.08*Math.sin(this.bob*2)})`;
    ctx.beginPath();ctx.arc(p.x,y,r*2.2,0,Math.PI*2);ctx.fill();
  }
  alive(){return this.z>-.03&&!this.got}
}

// ===== PARTICLE =====
class P{
  constructor(x,y,c){this.x=x;this.y=y;this.vx=rand(-100,100);this.vy=rand(-180,-40);this.life=1;this.c=c;this.s=rand(2,6)}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=280*dt;this.life-=dt*2.5}
  draw(){ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.c;ctx.beginPath();ctx.arc(this.x,this.y,this.s*this.life,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

// ===== FLOAT TEXT =====
class FT{
  constructor(x,y,t,c){this.x=x;this.y=y;this.t=t;this.c=c;this.life=1;this.vy=-50}
  update(dt){this.y+=this.vy*dt;this.life-=dt*1.8}
  draw(){ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.c;ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText(this.t,this.x,this.y);ctx.globalAlpha=1}
}

// ===== GAME =====
function init(){
  W=innerWidth;H=innerHeight;
  gameSpeed=BASE_SPEED;dist=0;score=0;combo=0;comboTimer=0;maxCombo=0;
  invT=0;spawnT=0;spawnI=1.3;
  obstacles=[];collectibles=[];particles=[];floats=[];
  player=new Player();
  lastTime=performance.now();
}

function spawnObs(){
  const l=Math.random()*3|0,t=Math.random()<.15?2:Math.random()<.5?0:1;
  obstacles.push(new Obs(l,1,t));
}

function spawnCol(){
  const l=Math.random()*3|0,r=Math.random(),t=r<.55?0:r<.88?1:2;
  collectibles.push(new Col(l,1,t));
}

function addCombo(){combo++;comboTimer=COMBO_WINDOW;if(combo>maxCombo)maxCombo=combo}
function breakCombo(){combo=0;comboTimer=0}

function addScore(base){
  const pts=Math.round(base*(1+combo*.5));
  score+=pts;addCombo();return pts;
}

function col(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function parts(x,y,c,n){for(let i=0;i<n;i++)particles.push(new P(x,y,c))}
function fltxt(x,y,t,c){floats.push(new FT(x,y,t,c))}

function update(dt){
  if(state!=='game')return;
  gameSpeed=lerp(gameSpeed,Math.min(MAX_SPEED,BASE_SPEED+dist*.25),dt*.4);
  dist+=gameSpeed*dt*.01;
  if(invT>0)invT-=dt;
  if(combo>0){comboTimer-=dt;if(comboTimer<=0)breakCombo()}
  spawnT-=dt;
  if(spawnT<=0){
    spawnT=rand(.35,spawnI);
    spawnI=Math.max(.45,spawnI-dt*.008);
    if(Math.random()<.6)spawnObs();
    if(Math.random()<.55)spawnCol();
  }
  player.update(dt);
  for(const o of obstacles){
    o.update(dt);
    if(!o.hit&&o.z<.18){
      o.hit=true;
      if(col(player.hitbox(),o.hitbox())&&invT<=0){
        breakCombo();invT=INVINCIBLE_DUR;
        parts(player.x,player.y-player.hScale*player.h*.5,'#ef4444',10);
        fltxt(player.x,player.y-player.hScale*player.h-10,'AUA!','#ef4444');
        shakeT=.25;vib(80);
        gameOver();return;
      }
    }
  }
  for(const c of collectibles){
    c.update(dt);
    if(!c.got&&c.z<.22&&c.z>0){
      const hb=player.hitbox(),cp=c.pos(),r=11*cp.s;
      const dx=player.x-cp.x,dy=player.y-hb.h/2-(cp.y-r);
      if(Math.sqrt(dx*dx+dy*dy)<r+22){
        c.got=true;
        const pts=addScore(PT[c.type]);
        parts(cp.x,cp.y-8,'#ffd700',6);
        fltxt(cp.x,cp.y-18,'+'+pts,'#ffd700');
        vib(20);
      }
    }
  }
  obstacles=obstacles.filter(o=>o.alive());
  collectibles=collectibles.filter(c=>c.alive());
  particles=particles.filter(p=>{p.update(dt);return p.life>0});
  floats=floats.filter(e=>{e.update(dt);return e.life>0});
  $('hScore').textContent=score;
  $('hDist').textContent=Math.round(dist)+' m';
  const ce=$('hCombo');
  if(combo>1){ce.style.display='block';ce.textContent='COMBO x'+combo}else ce.style.display='none';
  $('hSpeed').style.width=(gameSpeed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED)*100+'%';
}

// ===== DRAW =====
function drawCourt(){
  const s=ctx,hy=H*HORIZON_Y;
  // sky
  const sg=s.createLinearGradient(0,0,0,hy+40);
  sg.addColorStop(0,'#0c1222');sg.addColorStop(1,'#1e293b');
  s.fillStyle=sg;s.fillRect(0,0,W,hy+40);
  // stars
  s.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<40;i++){const sx=(i*137.5)%W,sy=(i*73.1)%(hy-20);s.beginPath();s.arc(sx,sy,.8,0,Math.PI*2);s.fill()}
  // floor
  const rw=W*.72,rx=(W-rw)/2;
  const fg=s.createLinearGradient(0,hy,0,H);
  fg.addColorStop(0,'#78350f');fg.addColorStop(.4,'#92400e');fg.addColorStop(1,'#b45309');
  s.fillStyle=fg;
  s.beginPath();s.moveTo(rx-15,hy);s.lineTo(rx+rw+15,hy);s.lineTo(W,H);s.lineTo(0,H);s.closePath();s.fill();
  // lane lines
  const lw=rw/LANES;
  s.strokeStyle='rgba(255,255,255,.2)';s.lineWidth=1.5;
  for(let i=1;i<LANES;i++){
    const lx=rx+lw*i;
    s.beginPath();s.moveTo(lx,hy);
    const spread=(lx-W/2)*2.5;
    s.lineTo(W/2+spread*.12,H);s.stroke();
  }
  // side lines
  s.strokeStyle='rgba(255,255,255,.35)';s.lineWidth=2.5;
  s.beginPath();s.moveTo(rx,hy);s.lineTo(0,H);s.stroke();
  s.beginPath();s.moveTo(rx+rw,hy);s.lineTo(W,H);s.stroke();
  // crowd
  s.fillStyle='rgba(0,0,0,.25)';
  for(let i=0;i<35;i++){
    const cx=(i/35)*W,cy=hy-8-Math.sin(i*1.7)*6;
    s.beginPath();s.arc(cx,cy,7+Math.sin(i*2.3)*2,0,Math.PI*2);s.fill();
    s.fillRect(cx-4,cy+4,8,10);
  }
  // markers
  const ms=80,off=dist%ms;
  for(let d=-1;d<18;d++){
    const mz=1-d*ms/1000+off/1000;
    if(mz<0||mz>1)continue;
    const mt=clamp(mz,0,1),my=lerp(hy,H,mt),ms2=lerp(.08,1,mt);
    s.fillStyle=`rgba(255,255,255,${.12*ms2})`;
    s.fillRect(W/2-18*ms2,my,36*ms2,2.5*ms2);
  }
}

function draw(){
  W=innerWidth;H=innerHeight;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeT>0){shakeT-=.016;ctx.translate(rand(-5,5),rand(-5,5))}
  drawCourt();
  const all=[...obstacles.map(o=>({z:o.z,d:o.draw.bind(o)})),...collectibles.map(c=>({z:c.z,d:c.draw.bind(c)}))];
  all.sort((a,b)=>b.z-a.z);
  for(const o of all)o.d();
  player.draw();
  for(const p of particles)p.draw();
  for(const f of floats)f.draw();
  ctx.restore();
}

function loop(t){
  const dt=Math.min((t-lastTime)/1000,.05);
  lastTime=t;update(dt);draw();
  requestAnimationFrame(loop);
}

// ===== LEADERBOARD =====
function getLB(){try{const v=JSON.parse(localStorage.getItem('hooprunner_lb')||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
function saveLB(lb){try{localStorage.setItem('hooprunner_lb',JSON.stringify(lb))}catch(e){}}
function esc(s){const e=document.createElement('span');e.textContent=String(s);return e.innerHTML}
function addToLB(n,s){const lb=getLB();lb.push({name:(n||'Player').slice(0,12),score:s,date:Date.now()});lb.sort((a,b)=>b.score-a.score);lb.splice(10);saveLB(lb);return lb}
function isHS(s){const lb=getLB();return lb.length<10||s>lb[lb.length-1].score}

function showLB(){
  const lb=getLB(),el=$('leaderboard');
  el.innerHTML=lb.length===0?'<p style="color:#64748b">Noch keine Einträge!</p>':lb.map((e,i)=>`<div class="lb-row"><span>${i+1}. ${esc(e.name)}</span><span>${Number(e.score)||0}</span></div>`).join('');
  $('menu').classList.add('hidden');
  $('leaderboardScreen').classList.remove('hidden');
}

function gameOver(){
  state='gameover';
  $('hud').style.display='none';
  $('touchHint').style.display='none';
  $('finalScore').textContent=score;
  $('finalDist').textContent=Math.round(dist)+' m';
  $('finalCombo').textContent='Bestes Combo: x'+maxCombo;
  $('newHigh').style.display=isHS(score)?'block':'none';
  addToLB(playerName,score);
  $('gameover').classList.remove('hidden');
  vib([100,50,100]);
}

// ===== INPUT =====
// Keyboard
addEventListener('keydown',e=>{
  if(state!=='game'){
    if(e.key==='Enter'&&state==='menu')$('playBtn').click();
    return;
  }
  if(e.key==='ArrowLeft'||e.key==='a'){player.left();e.preventDefault()}
  if(e.key==='ArrowRight'||e.key==='d'){player.right();e.preventDefault()}
  if(e.key==='ArrowUp'||e.key==='w'||e.key===' '){player.jump();e.preventDefault()}
  if(e.key==='ArrowDown'||e.key==='s'){player.slide();e.preventDefault()}
});

// Touch – optimized for mobile
addEventListener('touchstart',e=>{
  if(state!=='game')return;
  e.preventDefault();
  const t=e.touches[0];
  touchStart={x:t.clientX,y:t.clientY,id:t.identifier};
  touchStartTime=Date.now();
},{passive:false});

addEventListener('touchmove',e=>{
  if(state!=='game'||!touchStart)return;
  e.preventDefault();
  let cur=null;
  for(const t of e.touches)if(t.identifier===touchStart.id){cur=t;break}
  if(!cur)return;
  const dx=cur.clientX-touchStart.x,dy=cur.clientY-touchStart.y;
  const absDx=Math.abs(dx),absDy=Math.abs(dy);
  if(absDx<15&&absDy<15)return;
  if(absDx>absDy){
    // horizontal swipe = lane change
    if(dx>25){player.right();touchStart.x=cur.clientX}
    else if(dx<-25){player.left();touchStart.x=cur.clientX}
  }else{
    // vertical
    if(dy<-30){player.jump();touchStart=null}
    else if(dy>30){player.slide();touchStart=null}
  }
},{passive:false});

addEventListener('touchend',e=>{
  if(state!=='game')return;
  // tap detection – quick touch with minimal movement
  if(touchStart&&Date.now()-touchStartTime<200){
    const screenMid=W/2;
    if(touchStart.x<screenMid*.5){
      player.left();
    }else if(touchStart.x>screenMid*1.5){
      player.right();
    }
  }
  touchStart=null;
});

// Prevent context menu on long press
addEventListener('contextmenu',e=>{if(state==='game')e.preventDefault()});

// ===== UI =====
$('playBtn').addEventListener('click',()=>{
  playerName=$('playerName').value.trim()||'Player';
  try{localStorage.setItem('hooprunner_name',playerName)}catch(e){}
  init();state='game';
  $('menu').classList.add('hidden');
  $('hud').style.display='flex';
  $('touchHint').style.display='block';
  setTimeout(()=>{$('touchHint').style.transition='opacity 1s';$('touchHint').style.opacity='0'},4000);
});
$('retryBtn').addEventListener('click',()=>{
  init();state='game';
  $('gameover').classList.add('hidden');
  $('hud').style.display='flex';
  $('touchHint').style.display='block';$('touchHint').style.opacity='1';
  setTimeout(()=>{$('touchHint').style.transition='opacity 1s';$('touchHint').style.opacity='0'},4000);
});
$('menuBtn').addEventListener('click',()=>{
  state='menu';
  $('gameover').classList.add('hidden');
  $('menu').classList.remove('hidden');
});
$('lbBtn').addEventListener('click',showLB);
$('lbBack').addEventListener('click',()=>{
  $('leaderboardScreen').classList.add('hidden');
  $('menu').classList.remove('hidden');
});

// ===== INIT =====
try{$('playerName').value=localStorage.getItem('hooprunner_name')||''}catch(e){}
$('playerName').addEventListener('keydown',e=>{if(e.key==='Enter')$('playBtn').click()});
init();
requestAnimationFrame(loop);
</script>
