<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beat the Buzzer - Basketball Arcade</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="manifest" href="./site.webmanifest">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto+Condensed:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Roboto Condensed', sans-serif;
            user-select: none;
        }
        
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
        }
        
        .timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 32px;
            font-family: 'Black Ops One', cursive;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.8);
        }
        
        .timer.warning {
            animation: pulse-red 1s infinite;
            color: #e74c3c;
        }
        
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .combo {
            position: absolute;
            top: 60px;
            left: 20px;
            color: #f1c40f;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.8);
        }
        
        .combo.active {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .streak-bonus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2ecc71;
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.8);
            animation: none;
        }
        
        .streak-bonus.show {
            animation: streakPopup 1.5s ease-out;
        }
        
        @keyframes streakPopup {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1); }
        }
        
        #startScreen, #gameOverScreen, #leaderboardScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
        }
        
        h1 {
            font-family: 'Black Ops One', cursive;
            font-size: clamp(40px, 10vw, 64px);
            color: #e67e22;
            text-shadow: 0 0 30px rgba(230, 126, 34, 0.8);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            text-align: center;
            padding: 0 20px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .btn {
            padding: 16px 40px;
            font-size: 20px;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: bold;
            background: linear-gradient(45deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.4);
            margin: 6px;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(230, 126, 34, 0.6);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #7457A3, #5a3d8a);
            box-shadow: 0 10px 30px rgba(116, 87, 163, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 15px 40px rgba(116, 87, 163, 0.6);
        }
        
        .instructions {
            color: #bdc3c7;
            margin-top: 24px;
            text-align: center;
            line-height: 1.6;
            font-size: 16px;
            max-width: 600px;
            padding: 0 20px;
        }
        
        .powerup-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        
        .powerup {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            opacity: 0.3;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .powerup.active {
            opacity: 1;
            animation: glow 1s infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 20px currentColor; }
            to { box-shadow: 0 0 40px currentColor; }
        }
        
        .fireball { background: linear-gradient(45deg, #e74c3c, #c0392b); color: white; }
        .slowmo { background: linear-gradient(45deg, #3498db, #2980b9); color: white; }
        
        .final-score {
            font-size: 48px;
            color: #f1c40f;
            margin: 16px 0;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.8);
        }
        
        .stats {
            color: #95a5a6;
            margin: 8px 0;
            font-size: 18px;
        }
        
        .hidden { display: none !important; }
        
        /* Name Input */
        .name-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        
        .name-input-container label {
            color: #bdc3c7;
            font-size: 16px;
        }
        
        .name-input-container input {
            padding: 12px 24px;
            font-size: 18px;
            font-family: 'Roboto Condensed', sans-serif;
            border: 2px solid #e67e22;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-align: center;
            width: 280px;
            outline: none;
        }
        
        .name-input-container input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .name-input-container input:focus {
            border-color: #f39c12;
            background: rgba(255,255,255,0.15);
        }
        
        /* Leaderboard */
        .leaderboard-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            max-width: 420px;
            width: 90%;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .leaderboard-title {
            font-family: 'Black Ops One', cursive;
            font-size: 28px;
            color: #f1c40f;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leaderboard-table th {
            color: #e67e22;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        
        .leaderboard-table td {
            color: #ecf0f1;
            font-size: 16px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .leaderboard-table tr:nth-child(1) td { color: #f1c40f; font-weight: bold; }
        .leaderboard-table tr:nth-child(2) td { color: #bdc3c7; }
        .leaderboard-table tr:nth-child(3) td { color: #e67e22; }
        
        .leaderboard-table .rank {
            width: 40px;
            text-align: center;
        }
        
        .leaderboard-table .score-cell {
            text-align: right;
            font-family: 'Black Ops One', cursive;
        }
        
        .leaderboard-empty {
            color: #7f8c8d;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
        
        .btn-small {
            padding: 10px 24px;
            font-size: 16px;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        /* Mitglied Werden Button Animation */
        @keyframes glow-pulse {
            0%, 100% { 
                box-shadow: 0 0 5px #F2722C, 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #7457A3;
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #F2722C, 0 0 60px #7457A3;
                transform: scale(1.02);
            }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .member-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #F2722C 0%, #7457A3 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(242, 101, 34, 0.4);
            animation: glow-pulse 2s ease-in-out infinite, float 3s ease-in-out infinite;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .member-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #F2722C, 0 0 60px #7457A3;
        }
    </style>
<link rel="stylesheet" href="./css/cookie-consent.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="score-board">PUNKTE: <span id="score">0</span></div>
        <div class="timer" id="timerDisplay">⏱️ <span id="time">60</span></div>
        <div class="combo" id="combo">🔥 COMBO x<span id="comboCount">0</span></div>
        <div class="streak-bonus" id="streakBonus">+3s STREAK!</div>
        
        <div class="powerup-indicator">
            <div class="powerup fireball" id="fireballIcon">🔥</div>
            <div class="powerup slowmo" id="slowmoIcon">❄️</div>
        </div>
    </div>
    
    <div id="startScreen">
        <h1>🏀 BEAT THE BUZZER</h1>
        <button class="btn" onclick="game.start()">SPIEL STARTEN</button>
        <div class="button-row">
            <button class="btn btn-secondary" onclick="game.showLeaderboard()">🏆 RANGLISTE</button>
        </div>
        <div class="instructions">
            Ziehe zurück, um zu zielen • Lass los, um zu werfen<br>
            <strong>5 Treffer in Folge = +3 Sekunden</strong> (nur 3x pro Spiel!)<br>
            Der Korb wird schneller, bleibt aber im Bildschirm!
        </div>
    </div>
    
    <div id="gameOverScreen" class="hidden">
        <h1>⏰ GAME OVER!</h1>
        <div class="final-score">PUNKTE: <span id="finalScore">0</span></div>
        <div class="stats">BESTE STREAK: <span id="bestStreak">0</span></div>
        <div class="name-input-container">
            <label for="playerName">Dein Name für die Rangliste:</label>
            <input type="text" id="playerName" placeholder="Name eingeben..." maxlength="20" autocomplete="off">
        </div>
        <div class="button-row">
            <button class="btn" onclick="game.saveScore()">💾 SPEICHERN & NOCHMAL</button>
            <button class="btn btn-secondary" onclick="game.showLeaderboard()">🏆 RANGLISTE</button>
        </div>
        <div class="button-row">
            <button class="btn btn-small" onclick="game.restart()">Ohne Speichern nochmal</button>
        </div>
    </div>
    
    <div id="leaderboardScreen" class="hidden">
        <h1>🏆 RANGLISTE</h1>
        <div class="leaderboard-container" id="leaderboardContainer">
            <!-- Filled by JS -->
        </div>
        <div class="button-row" style="margin-top: 20px;">
            <button class="btn" onclick="game.hideLeaderboard()">← ZURÜCK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // ── Leaderboard ──
        const LEADERBOARD_KEY = 'nbc-beat-the-buzzer-lb';
        const MAX_ENTRIES = 10;
        
        function getLeaderboard() {
            try {
                const raw = localStorage.getItem(LEADERBOARD_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }
        
        function saveToLeaderboard(name, score) {
            const lb = getLeaderboard();
            lb.push({ name: name || 'Unbekannt', score: score, date: Date.now() });
            lb.sort((a, b) => b.score - a.score);
            lb.splice(MAX_ENTRIES);
            try {
                localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(lb));
            } catch (e) {}
            return lb;
        }
        
        function renderLeaderboard() {
            const container = document.getElementById('leaderboardContainer');
            const lb = getLeaderboard();
            
            if (lb.length === 0) {
                container.innerHTML = '<div class="leaderboard-empty">Noch keine Einträge.<br>Spiel jetzt und sei der Erste!</div>';
                return;
            }
            
            let html = '<table class="leaderboard-table"><thead><tr><th class="rank">#</th><th>Name</th><th class="score-cell">Punkte</th></tr></thead><tbody>';
            lb.forEach((entry, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
                html += `<tr><td class="rank">${medal}</td><td>${escapeHtml(entry.name)}</td><td class="score-cell">${entry.score}</td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // ── Game ──
        class BasketballGame {
            constructor() {
                this.state = 'menu';
                this.score = 0;
                this.time = 60;
                this.combo = 0;
                this.maxCombo = 0;
                this.lastScoreTime = 0;
                this.streakBonusUsed = 0;
                this.maxStreakBonuses = 3;
                
                // Player figure state
                this.player = {
                    x: 0,
                    y: 0,
                    armAngle: 0,
                    armDirection: 1,
                    throwFrame: 0,
                    isThrowing: false
                };
                
                this.ball = {
                    x: canvas.width / 2,
                    y: canvas.height - 150,
                    radius: 20,
                    vx: 0,
                    vy: 0,
                    isDragging: false,
                    isFlying: false,
                    trail: [],
                    dragStartX: canvas.width / 2,
                    dragStartY: canvas.height - 150,
                    aimX: canvas.width / 2,
                    aimY: canvas.height - 150,
                    aimPower: 0,
                    scored: false
                };
                
                this.hoop = {
                    x: canvas.width / 2,
                    y: 200,
                    width: 100,
                    baseSpeed: 2,
                    maxSpeed: 6,
                    amplitude: 0,
                    centerX: canvas.width / 2,
                    angle: 0
                };
                
                this.powerups = {
                    fireball: { active: false, timer: 0, duration: 5000 },
                    slowmo: { active: false, timer: 0, duration: 5000 }
                };
                
                this.particles = [];
                this.activePowerups = [];
                
                this.setupInputs();
                this.loop();
            }
            
            setupInputs() {
                const getPointerPos = (e) => e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
                
                const startDrag = (e) => {
                    if (this.state !== 'playing' || this.ball.isFlying) return;
                    const pos = getPointerPos(e);
                    const distToBall = Math.hypot(pos.clientX - this.ball.x, pos.clientY - this.ball.y);
                    if (distToBall > this.ball.radius + 35) return;
                    
                    this.ball.isDragging = true;
                    this.ball.dragStartX = this.ball.x;
                    this.ball.dragStartY = this.ball.y;
                    this.ball.aimX = pos.clientX;
                    this.ball.aimY = pos.clientY;
                    this.ball.aimPower = 0;
                };

                const moveDrag = (e) => {
                    if (!this.ball.isDragging) return;
                    const pos = getPointerPos(e);
                    const maxPull = Math.min(canvas.width * 0.28, 220);
                    const rawDx = pos.clientX - this.ball.dragStartX;
                    const rawDy = pos.clientY - this.ball.dragStartY;
                    const distance = Math.hypot(rawDx, rawDy);
                    const clampRatio = distance > maxPull ? maxPull / distance : 1;
                    
                    this.ball.aimX = this.ball.dragStartX + rawDx * clampRatio;
                    this.ball.aimY = this.ball.dragStartY + rawDy * clampRatio;
                    this.ball.aimPower = Math.min(distance, maxPull) / maxPull;
                };
                
                const endDrag = (e) => {
                    if (!this.ball.isDragging) return;
                    const pos = getPointerPos(e);
                    moveDrag(pos);
                    this.ball.isDragging = false;
                    
                    const dx = this.ball.dragStartX - this.ball.aimX;
                    const dy = this.ball.dragStartY - this.ball.aimY;
                    const power = Math.hypot(dx, dy);
                    
                    if (power > 20) {
                        this.ball.isFlying = true;
                        this.player.isThrowing = true;
                        this.player.throwFrame = 0;
                        const multiplier = this.powerups.fireball.active ? 1.3 : 1;
                        const velocityScale = 0.16 + this.ball.aimPower * 0.1;
                        this.ball.vx = dx * velocityScale * multiplier;
                        this.ball.vy = dy * velocityScale * multiplier;
                    }
                    
                    this.ball.aimPower = 0;
                    this.ball.aimX = this.ball.dragStartX;
                    this.ball.aimY = this.ball.dragStartY;
                };
                
                canvas.addEventListener('mousedown', startDrag);
                canvas.addEventListener('touchstart', startDrag, { passive: true });
                window.addEventListener('mousemove', moveDrag);
                window.addEventListener('touchmove', moveDrag, { passive: true });
                window.addEventListener('mouseup', endDrag);
                window.addEventListener('touchend', endDrag);
                window.addEventListener('touchcancel', endDrag);
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.add('hidden');
                this.state = 'playing';
                this.score = 0;
                this.time = 60;
                this.combo = 0;
                this.maxCombo = 0;
                this.streakBonusUsed = 0;
                this.resetBall();
                this.updateHoopBounds();
                this.updatePlayerPos();
                this.startTimer();
                this.spawnPowerupItem();
            }
            
            restart() {
                this.start();
            }
            
            updateHoopBounds() {
                const margin = 120;
                this.hoop.centerX = canvas.width / 2;
                this.hoop.amplitude = Math.min(300, (canvas.width / 2) - margin - this.hoop.width/2);
            }
            
            updatePlayerPos() {
                this.player.x = canvas.width / 2;
                this.player.y = canvas.height - 100;
            }
            
            startTimer() {
                this.timerInterval = setInterval(() => {
                    if (this.state !== 'playing') return;
                    this.time--;
                    
                    const timerDisplay = document.getElementById('timerDisplay');
                    if (this.time <= 10) {
                        timerDisplay.classList.add('warning');
                    } else {
                        timerDisplay.classList.remove('warning');
                    }
                    
                    document.getElementById('time').textContent = this.time;
                    if (this.time <= 0) this.gameOver();
                }, 1000);
            }
            
            resetBall() {
                this.updatePlayerPos();
                this.ball.x = this.player.x;
                this.ball.y = this.player.y - 50;
                this.ball.vx = 0;
                this.ball.vy = 0;
                this.ball.isFlying = false;
                this.ball.isDragging = false;
                this.ball.trail = [];
                this.ball.scored = false;
                this.ball.dragStartX = this.ball.x;
                this.ball.dragStartY = this.ball.y;
                this.ball.aimX = this.ball.x;
                this.ball.aimY = this.ball.y;
                this.ball.aimPower = 0;
                this.player.isThrowing = false;
                this.player.throwFrame = 0;
            }
            
            spawnPowerupItem() {
                if (this.state !== 'playing') return;
                
                setTimeout(() => {
                    if (this.state !== 'playing') return;
                    if (Math.random() < 0.4 && this.activePowerups.length < 2) {
                        const types = ['fireball', 'slowmo'];
                        const type = types[Math.floor(Math.random() * types.length)];
                        this.activePowerups.push({
                            x: 150 + Math.random() * (canvas.width - 300),
                            y: 350 + Math.random() * (canvas.height - 600),
                            type: type,
                            radius: 25,
                            bobOffset: Math.random() * Math.PI * 2
                        });
                    }
                    this.spawnPowerupItem();
                }, 6000 + Math.random() * 6000);
            }
            
            activatePowerup(type) {
                const p = this.powerups[type];
                p.active = true;
                p.timer = Date.now();
                
                document.getElementById(type + 'Icon').classList.add('active');
                
                setTimeout(() => {
                    p.active = false;
                    document.getElementById(type + 'Icon').classList.remove('active');
                }, p.duration);
            }
            
            update() {
                if (this.state !== 'playing') return;
                
                const timeScale = this.powerups.slowmo.active ? 0.5 : 1;
                
                // Player idle animation
                if (!this.ball.isDragging && !this.ball.isFlying) {
                    this.player.armAngle += 0.03 * this.player.armDirection;
                    if (this.player.armAngle > 0.3) this.player.armDirection = -1;
                    if (this.player.armAngle < -0.1) this.player.armDirection = 1;
                }
                
                // Throw animation
                if (this.player.isThrowing) {
                    this.player.throwFrame += 0.15 * timeScale;
                    if (this.player.throwFrame >= 1) {
                        this.player.isThrowing = false;
                        this.player.throwFrame = 0;
                    }
                }
                
                // Korb Bewegung
                const difficulty = Math.min(this.score * 0.02, 0.8);
                const speed = this.hoop.baseSpeed + (this.hoop.maxSpeed - this.hoop.baseSpeed) * difficulty;
                const slowFactor = this.powerups.slowmo.active ? 0.4 : 1;
                
                this.hoop.angle += speed * 0.02 * slowFactor * timeScale;
                this.hoop.x = this.hoop.centerX + Math.sin(this.hoop.angle) * this.hoop.amplitude;
                
                // Power-up Items
                this.activePowerups.forEach(p => {
                    p.bobOffset += 0.05;
                });
                
                // Ball Physik
                if (this.ball.isFlying) {
                    const gravity = 0.5 * timeScale;
                    this.ball.vy += gravity;
                    this.ball.x += this.ball.vx * timeScale;
                    this.ball.y += this.ball.vy * timeScale;
                    
                    this.ball.trail.push({ x: this.ball.x, y: this.ball.y, alpha: 1 });
                    if (this.ball.trail.length > 10) this.ball.trail.shift();
                    
                    // Korb Kollision
                    const hoopLeft = this.hoop.x - this.hoop.width/2 + 10;
                    const hoopRight = this.hoop.x + this.hoop.width/2 - 10;
                    const hoopTop = this.hoop.y;
                    
                    if (this.ball.vy > 0 && 
                        this.ball.x > hoopLeft && 
                        this.ball.x < hoopRight &&
                        this.ball.y > hoopTop - 30 && 
                        this.ball.y < hoopTop + 20 &&
                        !this.ball.scored) {
                        
                        this.ball.scored = true;
                        this.scorePoint();
                    }
                    
                    // Boden
                    if (this.ball.y > canvas.height - this.ball.radius) {
                        this.combo = 0;
                        this.updateCombo();
                        setTimeout(() => this.resetBall(), 400);
                    }
                    
                    // Wände
                    if (this.ball.x < 0 || this.ball.x > canvas.width) {
                        this.ball.vx *= -0.8;
                        this.ball.x = Math.max(0, Math.min(canvas.width, this.ball.x));
                    }
                    
                    // Decke
                    if (this.ball.y < -100) {
                        this.combo = 0;
                        this.updateCombo();
                        setTimeout(() => this.resetBall(), 500);
                    }
                }
                
                // Power-up Kollision
                this.activePowerups = this.activePowerups.filter(p => {
                    const dist = Math.sqrt(
                        Math.pow(this.ball.x - p.x, 2) + 
                        Math.pow(this.ball.y - p.y, 2)
                    );
                    
                    if (dist < this.ball.radius + p.radius && this.ball.isFlying) {
                        this.activatePowerup(p.type);
                        this.createParticles(p.x, p.y, p.type === 'fireball' ? '#e74c3c' : '#3498db');
                        return false;
                    }
                    return true;
                });
                
                // Partikel
                this.particles = this.particles.filter(p => {
                    p.x += p.vx * timeScale;
                    p.y += p.vy * timeScale;
                    p.vy += 0.2 * timeScale;
                    p.life -= 0.02 * timeScale;
                    p.alpha = p.life;
                    return p.life > 0;
                });
            }
            
            scorePoint() {
                const now = Date.now();
                const timeDiff = now - this.lastScoreTime;
                
                if (timeDiff < 4000) {
                    this.combo++;
                    
                    if (this.combo >= 5 && this.streakBonusUsed < this.maxStreakBonuses) {
                        this.time += 3;
                        this.streakBonusUsed++;
                        this.showStreakBonus();
                        this.createParticles(this.hoop.x, this.hoop.y, '#2ecc71', 25);
                    }
                } else {
                    this.combo = 1;
                }
                
                this.maxCombo = Math.max(this.maxCombo, this.combo);
                this.lastScoreTime = now;
                
                const basePoints = this.powerups.fireball.active ? 2 : 1;
                const comboMultiplier = this.combo > 1 ? 1 + Math.floor(this.combo / 3) * 0.5 : 1;
                this.score += Math.floor(basePoints * comboMultiplier);
                
                document.getElementById('score').textContent = this.score;
                this.updateCombo();
                
                const color = this.powerups.fireball.active ? '#e74c3c' : 
                             this.combo >= 5 ? '#2ecc71' : '#e67e22';
                this.createParticles(this.hoop.x, this.hoop.y, color, 
                    this.combo >= 5 ? 20 : 12);
                
                setTimeout(() => this.resetBall(), this.combo > 3 ? 420 : 520);
            }
            
            showStreakBonus() {
                const el = document.getElementById('streakBonus');
                el.textContent = `+3s STREAK! (${this.streakBonusUsed}/${this.maxStreakBonuses})`;
                el.classList.remove('show');
                void el.offsetWidth;
                el.classList.add('show');
            }
            
            updateCombo() {
                const comboEl = document.getElementById('combo');
                const comboCount = document.getElementById('comboCount');
                
                if (this.combo > 1) {
                    comboCount.textContent = this.combo;
                    comboEl.classList.add('active');
                } else {
                    comboEl.classList.remove('active');
                }
            }
            
            createParticles(x, y, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = 3 + Math.random() * 5;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        alpha: 1,
                        color: color,
                        size: 3 + Math.random() * 5
                    });
                }
            }
            
            // ── Draw Player Figure ──
            drawPlayer() {
                const px = this.player.x;
                const py = this.player.y;
                const scale = 1;
                
                ctx.save();
                ctx.translate(px, py);
                ctx.scale(scale, scale);
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, 45, 25, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Legs
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                // Left leg
                ctx.beginPath();
                ctx.moveTo(-10, 10);
                ctx.lineTo(-15, 40);
                ctx.stroke();
                // Right leg
                ctx.beginPath();
                ctx.moveTo(10, 10);
                ctx.lineTo(15, 40);
                ctx.stroke();
                
                // Shoes
                ctx.fillStyle = '#e67e22';
                ctx.beginPath();
                ctx.ellipse(-15, 42, 8, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(15, 42, 8, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Body (jersey)
                ctx.fillStyle = '#F2722C';
                ctx.beginPath();
                ctx.moveTo(-18, -25);
                ctx.lineTo(18, -25);
                ctx.lineTo(15, 12);
                ctx.lineTo(-15, 12);
                ctx.closePath();
                ctx.fill();
                
                // Jersey number
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Roboto Condensed';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('NBC', 0, -8);
                
                // Head
                ctx.fillStyle = '#f0c090';
                ctx.beginPath();
                ctx.arc(0, -38, 14, 0, Math.PI * 2);
                ctx.fill();
                
                // Hair
                ctx.fillStyle = '#4a3728';
                ctx.beginPath();
                ctx.arc(0, -44, 12, Math.PI, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(-5, -39, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5, -39, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Arm with ball (when not flying)
                if (!this.ball.isFlying) {
                    const armBaseAngle = this.ball.isDragging 
                        ? Math.atan2(this.ball.aimY - this.ball.y, this.ball.aimX - this.ball.x)
                        : -Math.PI / 2 + this.player.armAngle;
                    
                    const armLength = 30;
                    const handX = Math.cos(armBaseAngle) * armLength;
                    const handY = Math.sin(armBaseAngle) * armLength - 15;
                    
                    // Arm
                    ctx.strokeStyle = '#f0c090';
                    ctx.lineWidth = 7;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(12, -20);
                    ctx.lineTo(handX, handY);
                    ctx.stroke();
                    
                    // Ball in hand
                    if (!this.ball.isDragging) {
                        const ballGradient = ctx.createRadialGradient(
                            handX - 3, handY - 3, 0,
                            handX, handY, this.ball.radius * 0.7
                        );
                        ballGradient.addColorStop(0, '#ffad33');
                        ballGradient.addColorStop(1, '#d35400');
                        ctx.fillStyle = ballGradient;
                        ctx.beginPath();
                        ctx.arc(handX, handY, this.ball.radius * 0.7, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Ball lines
                        ctx.strokeStyle = '#2c3e50';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(handX, handY, this.ball.radius * 0.7 - 2, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else {
                    // Throwing arm follow-through
                    const throwProgress = this.player.throwFrame;
                    if (throwProgress < 1) {
                        const armAngle = -Math.PI / 2 - throwProgress * 1.5;
                        const armLength = 30;
                        const handX = Math.cos(armAngle) * armLength;
                        const handY = Math.sin(armAngle) * armLength - 15;
                        
                        ctx.strokeStyle = '#f0c090';
                        ctx.lineWidth = 7;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(12, -20);
                        ctx.lineTo(handX, handY);
                        ctx.stroke();
                    } else {
                        // Resting arm
                        ctx.strokeStyle = '#f0c090';
                        ctx.lineWidth = 7;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(12, -20);
                        ctx.lineTo(25, -5);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            }
            
            draw() {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Grid
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                
                // Ziel-/Flugbahn-Vorschau
                if (this.ball.isDragging && this.state === 'playing') {
                    const dx = this.ball.dragStartX - this.ball.aimX;
                    const dy = this.ball.dragStartY - this.ball.aimY;
                    const multiplier = this.powerups.fireball.active ? 1.3 : 1;
                    const velocityScale = 0.16 + this.ball.aimPower * 0.1;
                    let previewX = this.ball.x;
                    let previewY = this.ball.y;
                    let previewVx = dx * velocityScale * multiplier;
                    let previewVy = dy * velocityScale * multiplier;
                    
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.25 + this.ball.aimPower * 0.35})`;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([8, 10]);
                    ctx.beginPath();
                    ctx.moveTo(previewX, previewY);
                    
                    for (let i = 0; i < 22; i++) {
                        previewVy += 0.5;
                        previewX += previewVx;
                        previewY += previewVy;
                        ctx.lineTo(previewX, previewY);
                    }
                    
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = `rgba(242, 114, 44, ${0.2 + this.ball.aimPower * 0.45})`;
                    ctx.beginPath();
                    ctx.arc(this.ball.aimX, this.ball.aimY, 18 + this.ball.aimPower * 12, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Power-up Items
                this.activePowerups.forEach(p => {
                    const bob = Math.sin(p.bobOffset) * 5;
                    const gradient = ctx.createRadialGradient(
                        p.x, p.y + bob, 0,
                        p.x, p.y + bob, p.radius * 2
                    );
                    gradient.addColorStop(0, p.type === 'fireball' ? 
                        'rgba(231, 76, 60, 0.6)' : 'rgba(52, 152, 219, 0.6)');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y + bob, p.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = p.type === 'fireball' ? '#e74c3c' : '#3498db';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y + bob, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.type === 'fireball' ? '🔥' : '❄️', p.x, p.y + bob);
                });
                
                // Korb mit Glow
                const hoopGradient = ctx.createLinearGradient(
                    this.hoop.x - this.hoop.width/2, this.hoop.y,
                    this.hoop.x + this.hoop.width/2, this.hoop.y
                );
                hoopGradient.addColorStop(0, '#e67e22');
                hoopGradient.addColorStop(0.5, '#f39c12');
                hoopGradient.addColorStop(1, '#e67e22');
                
                const speedFactor = Math.min(this.score * 0.02, 0.8);
                if (speedFactor > 0.5) {
                    ctx.shadowColor = '#e67e22';
                    ctx.shadowBlur = 20 * speedFactor;
                }
                
                // Korb Brett
                ctx.fillStyle = 'rgba(52, 73, 94, 0.8)';
                ctx.fillRect(this.hoop.x - 10, this.hoop.y - 60, 20, 60);
                
                // Korb Ring
                ctx.strokeStyle = hoopGradient;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(this.hoop.x - this.hoop.width/2, this.hoop.y);
                ctx.lineTo(this.hoop.x + this.hoop.width/2, this.hoop.y);
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                // Netz
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
                for (let i = -this.hoop.width/2 + 10; i < this.hoop.width/2; i += 15) {
                    ctx.beginPath();
                    ctx.moveTo(this.hoop.x + i, this.hoop.y);
                    ctx.lineTo(this.hoop.x + i * 0.7, this.hoop.y + 40);
                    ctx.stroke();
                }
                
                // Ball Trail
                this.ball.trail.forEach((point, i) => {
                    const alpha = (i / this.ball.trail.length) * 0.65;
                    ctx.fillStyle = this.powerups.fireball.active ? 
                        `rgba(231, 76, 60, ${alpha})` : `rgba(242, 114, 44, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, Math.max(5, this.ball.radius * (i / 9)), 0, Math.PI * 2);
                    ctx.fill();
                });

                if (this.ball.isFlying) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 10]);
                    ctx.beginPath();
                    const futureX = this.ball.x + this.ball.vx * 6;
                    const futureY = this.ball.y + this.ball.vy * 6;
                    ctx.moveTo(this.ball.x, this.ball.y);
                    ctx.lineTo(futureX, futureY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                // Ball (when flying)
                if (this.ball.isFlying) {
                    const ballGradient = ctx.createRadialGradient(
                        this.ball.x - 5, this.ball.y - 5, 0,
                        this.ball.x, this.ball.y, this.ball.radius
                    );
                    
                    if (this.powerups.fireball.active) {
                        ballGradient.addColorStop(0, '#ff9999');
                        ballGradient.addColorStop(1, '#c0392b');
                        ctx.shadowColor = '#e74c3c';
                        ctx.shadowBlur = 20;
                    } else {
                        ballGradient.addColorStop(0, '#ffad33');
                        ballGradient.addColorStop(1, '#d35400');
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fillStyle = ballGradient;
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Ball Linien
                    ctx.strokeStyle = '#2c3e50';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.radius - 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(this.ball.x - this.ball.radius + 5, this.ball.y);
                    ctx.lineTo(this.ball.x + this.ball.radius - 5, this.ball.y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(this.ball.x, this.ball.y - this.ball.radius + 5);
                    ctx.lineTo(this.ball.x, this.ball.y + this.ball.radius - 5);
                    ctx.stroke();
                }
                
                // Player figure
                if (this.state === 'playing') {
                    this.drawPlayer();
                }
                
                // Partikel
                this.particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                
                // Drag Indikator
                if (this.ball.isDragging) {
                    const ringAlpha = 0.35 + this.ball.aimPower * 0.45;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${ringAlpha})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.radius + 10 + this.ball.aimPower * 10, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.strokeStyle = `rgba(242, 114, 44, ${0.35 + this.ball.aimPower * 0.45})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(this.ball.x, this.ball.y);
                    ctx.lineTo(this.ball.aimX, this.ball.aimY);
                    ctx.stroke();
                }
            }
            
            gameOver() {
                this.state = 'gameover';
                clearInterval(this.timerInterval);
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('bestStreak').textContent = this.maxCombo;
                document.getElementById('gameOverScreen').classList.remove('hidden');
                document.getElementById('playerName').value = '';
                document.getElementById('playerName').focus();
            }
            
            saveScore() {
                const name = document.getElementById('playerName').value.trim() || 'Unbekannt';
                saveToLeaderboard(name, this.score);
                this.start();
            }
            
            showLeaderboard() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('leaderboardScreen').classList.remove('hidden');
                renderLeaderboard();
            }
            
            hideLeaderboard() {
                document.getElementById('leaderboardScreen').classList.add('hidden');
                if (this.state === 'menu') {
                    document.getElementById('startScreen').classList.remove('hidden');
                } else if (this.state === 'gameover') {
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                }
            }
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }
        
        const game = new BasketballGame();
    </script>
