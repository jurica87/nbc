<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Run & Jump - NBC Baskets</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="manifest" href="./site.webmanifest">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Oswald', sans-serif;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            margin: 0 auto;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(242, 114, 44, 0.6);
        }

        .score-display span {
            color: #F2722C;
            font-size: 36px;
        }

        .highscore-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #7457A3;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(116, 87, 163, 0.5);
        }

        .highscore-display span {
            color: #F2722C;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        .overlay-screen.hidden {
            display: none !important;
        }

        .game-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(48px, 12vw, 80px);
            font-weight: 700;
            color: #F2722C;
            text-shadow: 0 0 40px rgba(242, 114, 44, 0.5);
            margin-bottom: 8px;
            text-align: center;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .game-subtitle {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(16px, 4vw, 24px);
            color: #7457A3;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 32px;
            text-shadow: 0 0 20px rgba(116, 87, 163, 0.4);
        }

        .btn {
            padding: 16px 48px;
            font-size: 20px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, #F2722C, #e06010);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(242, 114, 44, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 6px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 40px rgba(242, 114, 44, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #7457A3, #5a3d8a);
            box-shadow: 0 8px 30px rgba(116, 87, 163, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 40px rgba(116, 87, 163, 0.6);
        }

        .instructions {
            color: #94a3b8;
            margin-top: 28px;
            text-align: center;
            line-height: 1.8;
            font-family: 'Roboto', sans-serif;
            font-size: 15px;
            max-width: 480px;
            padding: 0 20px;
        }

        .instructions strong {
            color: #F2722C;
        }

        .final-score-big {
            font-family: 'Oswald', sans-serif;
            font-size: 64px;
            font-weight: 700;
            color: #F2722C;
            text-shadow: 0 0 30px rgba(242, 114, 44, 0.6);
            margin: 16px 0;
        }

        .stats-row {
            display: flex;
            gap: 32px;
            margin: 16px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #F2722C;
        }

        .stat-label {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .new-record {
            color: #fbbf24;
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-gold 1s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        /* Mobile tap hint */
        .tap-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: tap-pulse 2s ease-in-out infinite;
        }

        @keyframes tap-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* Member button */
        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 5px #F2722C, 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #7457A3;
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 10px #F2722C, 0 0 20px #F2722C, 0 0 40px #F2722C, 0 0 60px #7457A3;
                transform: scale(1.02);
            }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .member-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #F2722C 0%, #7457A3 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(242, 101, 34, 0.4);
            animation: glow-pulse 2s ease-in-out infinite, float 3s ease-in-out infinite;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .member-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #F2722C, 0 0 60px #7457A3;
        }
    </style>
    <link rel="stylesheet" href="./css/cookie-consent.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="score-display">PUNKTE: <span id="score">0</span></div>
        <div class="highscore-display">BEST: <span id="highscore">0</span></div>
        <div class="tap-hint" id="tapHint">👆 TIPPE ZU SPRINGEN</div>
    </div>

    <div id="startScreen" class="overlay-screen">
        <div class="game-title">🏀 RUN & JUMP</div>
        <div class="game-subtitle">NBC Baskets Nordhorn</div>
        <button class="btn" onclick="game.start()">SPIEL STARTEN</button>
        <div class="instructions">
            <strong>TIPPE</strong> oder <strong>DRÜCKE LEERTASTE</strong> zum Springen<br>
            Weiche den Hindernissen aus und sammle Punkte!<br>
            Je länger du durchhältst, desto schneller wird es.
        </div>
    </div>

    <div id="gameOverScreen" class="overlay-screen hidden">
        <div class="game-title">GAME OVER</div>
        <div id="newRecordLabel" class="new-record hidden">🏆 NEUER REKORD!</div>
        <div class="final-score-big"><span id="finalScore">0</span></div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="statJumps">0</div>
                <div class="stat-label">Sprünge</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statDodged">0</div>
                <div class="stat-label">Ausgewichen</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statTime">0s</div>
                <div class="stat-label">Überlebt</div>
            </div>
        </div>
        <div class="button-row">
            <button class="btn" onclick="game.start()">NOCHMAL</button>
            <button class="btn btn-secondary" onclick="game.showMenu()">MENÜ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const HS_KEY = 'nbc-run-jump-highscore';

        function getHighscore() {
            try {
                return parseInt(localStorage.getItem(HS_KEY)) || 0;
            } catch (e) { return 0; }
        }

        function setHighscore(val) {
            try {
                localStorage.setItem(HS_KEY, val.toString());
            } catch (e) {}
        }

        // ── Game ──
        class RunAndJumpGame {
            constructor() {
                this.state = 'menu';
                this.score = 0;
                this.highscore = getHighscore();
                this.jumps = 0;
                this.dodged = 0;
                this.startTime = 0;
                this.elapsed = 0;
                this.speed = 4;
                this.gravity = 0.6;
                this.groundY = 0;
                this.spawnTimer = 0;
                this.spawnInterval = 90;
                this.obstacles = [];
                this.particles = [];
                this.clouds = [];
                this.bgOffset = 0;
                this.difficulty = 0;

                // Player
                this.player = {
                    x: 0,
                    y: 0,
                    width: 40,
                    height: 55,
                    vy: 0,
                    isJumping: false,
                    jumpCount: 0,
                    maxJumps: 2,
                    squash: 1,
                    rotation: 0,
                    trail: []
                };

                this.initClouds();
                this.updateHighscoreDisplay();
                this.setupInputs();
                this.loop();
            }

            initClouds() {
                this.clouds = [];
                for (let i = 0; i < 5; i++) {
                    this.clouds.push({
                        x: Math.random() * canvas.width,
                        y: 40 + Math.random() * 120,
                        size: 30 + Math.random() * 50,
                        speed: 0.3 + Math.random() * 0.5
                    });
                }
            }

            setupInputs() {
                const doJump = (e) => {
                    if (this.state !== 'playing') return;
                    if (e.type === 'keydown' && e.code !== 'Space') return;
                    if (e.type === 'keydown') e.preventDefault();
                    this.jump();
                };

                document.addEventListener('keydown', doJump);
                canvas.addEventListener('mousedown', doJump);
                canvas.addEventListener('touchstart', (e) => {
                    if (this.state === 'playing') {
                        e.preventDefault();
                        this.jump();
                    }
                }, { passive: false });
            }

            jump() {
                if (this.player.jumpCount < this.player.maxJumps) {
                    this.player.vy = -13 - this.difficulty * 0.5;
                    this.player.isJumping = true;
                    this.player.jumpCount++;
                    this.jumps++;
                    this.player.squash = 0.7;

                    // Jump particles
                    for (let i = 0; i < 6; i++) {
                        this.particles.push({
                            x: this.player.x + this.player.width / 2,
                            y: this.player.y + this.player.height,
                            vx: (Math.random() - 0.5) * 4,
                            vy: Math.random() * 2,
                            life: 1,
                            color: '#F2722C',
                            size: 3 + Math.random() * 4
                        });
                    }

                    document.getElementById('tapHint').style.opacity = '0';
                }
            }

            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');

                this.state = 'playing';
                this.score = 0;
                this.jumps = 0;
                this.dodged = 0;
                this.speed = 4;
                this.difficulty = 0;
                this.spawnTimer = 0;
                this.spawnInterval = 90;
                this.obstacles = [];
                this.particles = [];
                this.startTime = Date.now();
                this.elapsed = 0;

                this.groundY = canvas.height - 80;
                this.player.x = canvas.width * 0.2;
                this.player.y = this.groundY - this.player.height;
                this.player.vy = 0;
                this.player.isJumping = false;
                this.player.jumpCount = 0;
                this.player.squash = 1;
                this.player.rotation = 0;
                this.player.trail = [];

                this.initClouds();
                this.updateScoreDisplay();
            }

            showMenu() {
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                this.state = 'menu';
            }

            spawnObstacle() {
                const types = ['cone', 'barrier', 'ball'];
                const type = types[Math.floor(Math.random() * types.length)];

                let obs = {
                    x: canvas.width + 50,
                    type: type,
                    passed: false
                };

                if (type === 'cone') {
                    obs.width = 30;
                    obs.height = 45;
                    obs.y = this.groundY - obs.height;
                } else if (type === 'barrier') {
                    obs.width = 50;
                    obs.height = 35;
                    obs.y = this.groundY - obs.height;
                } else if (type === 'ball') {
                    obs.width = 35;
                    obs.height = 35;
                    obs.y = this.groundY - 60 - Math.random() * 40;
                    obs.bobOffset = Math.random() * Math.PI * 2;
                }

                this.obstacles.push(obs);
            }

            update() {
                if (this.state !== 'playing') return;

                this.elapsed = (Date.now() - this.startTime) / 1000;
                this.difficulty = Math.min(this.elapsed / 30, 1);
                this.speed = 4 + this.difficulty * 4;
                this.spawnInterval = Math.max(50, 90 - this.difficulty * 30);

                // Score
                this.score = Math.floor(this.elapsed * 10);
                this.updateScoreDisplay();

                // Player physics
                this.player.vy += this.gravity;
                this.player.y += this.player.vy;

                // Ground collision
                if (this.player.y >= this.groundY - this.player.height) {
                    this.player.y = this.groundY - this.player.height;
                    this.player.vy = 0;
                    this.player.isJumping = false;
                    this.player.jumpCount = 0;
                    this.player.squash = 1.15;
                }

                // Squash recovery
                this.player.squash += (1 - this.player.squash) * 0.15;

                // Rotation while jumping
                if (this.player.isJumping) {
                    this.player.rotation += 0.08;
                } else {
                    this.player.rotation *= 0.8;
                }

                // Trail
                if (this.player.isJumping && this.score % 3 === 0) {
                    this.player.trail.push({
                        x: this.player.x + this.player.width / 2,
                        y: this.player.y + this.player.height,
                        alpha: 0.5
                    });
                }
                this.player.trail = this.player.trail.filter(t => {
                    t.alpha -= 0.03;
                    return t.alpha > 0;
                });

                // Spawn obstacles
                this.spawnTimer++;
                if (this.spawnTimer >= this.spawnInterval) {
                    this.spawnTimer = 0;
                    this.spawnObstacle();
                }

                // Update obstacles
                this.obstacles.forEach(obs => {
                    obs.x -= this.speed;
                    if (obs.type === 'ball') {
                        obs.bobOffset += 0.05;
                    }

                    // Check passed
                    if (!obs.passed && obs.x + obs.width < this.player.x) {
                        obs.passed = true;
                        this.dodged++;
                    }
                });

                // Remove off-screen
                this.obstacles = this.obstacles.filter(obs => obs.x > -100);

                // Collision detection
                const px = this.player.x + 8;
                const py = this.player.y + 5;
                const pw = this.player.width - 16;
                const ph = this.player.height - 10;

                for (const obs of this.obstacles) {
                    let oy = obs.y;
                    if (obs.type === 'ball') {
                        oy = obs.y + Math.sin(obs.bobOffset) * 8;
                    }

                    if (px < obs.x + obs.width &&
                        px + pw > obs.x &&
                        py < oy + obs.height &&
                        py + ph > oy) {
                        this.gameOver();
                        return;
                    }
                }

                // Clouds
                this.clouds.forEach(c => {
                    c.x -= c.speed;
                    if (c.x < -c.size * 2) {
                        c.x = canvas.width + c.size;
                        c.y = 40 + Math.random() * 120;
                    }
                });

                // Particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= 0.03;
                    return p.life > 0;
                });

                // Background offset
                this.bgOffset = (this.bgOffset + this.speed * 0.3) % 100;
            }

            draw() {
                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#0f172a');
                skyGrad.addColorStop(0.5, '#1e293b');
                skyGrad.addColorStop(1, '#334155');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Stars
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                for (let i = 0; i < 40; i++) {
                    const sx = (i * 137 + this.bgOffset * 0.1) % canvas.width;
                    const sy = (i * 73) % (canvas.height * 0.5);
                    const ss = 1 + (i % 3);
                    ctx.beginPath();
                    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Clouds
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                this.clouds.forEach(c => {
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                    ctx.arc(c.x + c.size * 0.6, c.y - c.size * 0.2, c.size * 0.7, 0, Math.PI * 2);
                    ctx.arc(c.x - c.size * 0.5, c.y + c.size * 0.1, c.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Ground
                const groundGrad = ctx.createLinearGradient(0, this.groundY, 0, canvas.height);
                groundGrad.addColorStop(0, '#1a1a2e');
                groundGrad.addColorStop(1, '#0f0f1a');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, this.groundY, canvas.width, canvas.height - this.groundY);

                // Ground line
                ctx.strokeStyle = '#F2722C';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#F2722C';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(0, this.groundY);
                ctx.lineTo(canvas.width, this.groundY);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Ground markings
                ctx.strokeStyle = 'rgba(242, 114, 44, 0.15)';
                ctx.lineWidth = 2;
                for (let i = 0; i < canvas.width + 100; i += 100) {
                    const gx = i - this.bgOffset;
                    ctx.beginPath();
                    ctx.moveTo(gx, this.groundY + 15);
                    ctx.lineTo(gx + 50, this.groundY + 15);
                    ctx.stroke();
                }

                // Player trail
                this.player.trail.forEach(t => {
                    ctx.fillStyle = `rgba(242, 114, 44, ${t.alpha * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 8 * t.alpha, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Obstacles
                this.obstacles.forEach(obs => {
                    let oy = obs.y;
                    if (obs.type === 'ball') {
                        oy = obs.y + Math.sin(obs.bobOffset) * 8;
                    }

                    ctx.save();

                    if (obs.type === 'cone') {
                        // Traffic cone
                        ctx.fillStyle = '#F2722C';
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.width / 2, oy);
                        ctx.lineTo(obs.x + obs.width, oy + obs.height);
                        ctx.lineTo(obs.x, oy + obs.height);
                        ctx.closePath();
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.width * 0.2, oy + obs.height * 0.5);
                        ctx.lineTo(obs.x + obs.width * 0.8, oy + obs.height * 0.5);
                        ctx.stroke();
                    } else if (obs.type === 'barrier') {
                        // Barrier stripes
                        ctx.fillStyle = '#7457A3';
                        ctx.fillRect(obs.x, oy, obs.width, obs.height);
                        ctx.fillStyle = '#F2722C';
                        for (let i = 0; i < obs.width; i += 15) {
                            ctx.fillRect(obs.x + i, oy, 8, obs.height);
                        }
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obs.x, oy, obs.width, obs.height);
                    } else if (obs.type === 'ball') {
                        // Floating basketball obstacle
                        const grad = ctx.createRadialGradient(
                            obs.x + obs.width / 2 - 3, oy + obs.height / 2 - 3, 0,
                            obs.x + obs.width / 2, oy + obs.height / 2, obs.width / 2
                        );
                        grad.addColorStop(0, '#ffad33');
                        grad.addColorStop(1, '#d35400');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(obs.x + obs.width / 2, oy + obs.height / 2, obs.width / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#2c3e50';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(obs.x + obs.width / 2, oy + obs.height / 2, obs.width / 2 - 2, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(obs.x + 3, oy + obs.height / 2);
                        ctx.lineTo(obs.x + obs.width - 3, oy + obs.height / 2);
                        ctx.stroke();
                    }

                    ctx.restore();
                });

                // Player
                this.drawPlayer();

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            drawPlayer() {
                const px = this.player.x;
                const py = this.player.y;
                const pw = this.player.width;
                const ph = this.player.height;

                ctx.save();
                ctx.translate(px + pw / 2, py + ph / 2);
                ctx.rotate(this.player.rotation);
                ctx.scale(1 / this.player.squash, this.player.squash);
                ctx.translate(-pw / 2, -ph / 2);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(pw / 2, ph + 2, pw * 0.4, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                const legSpread = this.player.isJumping ? 8 : 4;
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                // Left leg
                ctx.beginPath();
                ctx.moveTo(pw * 0.35, ph * 0.6);
                ctx.lineTo(pw * 0.35 - legSpread, ph * 0.95);
                ctx.stroke();
                // Right leg
                ctx.beginPath();
                ctx.moveTo(pw * 0.65, ph * 0.6);
                ctx.lineTo(pw * 0.65 + legSpread, ph * 0.95);
                ctx.stroke();

                // Shoes
                ctx.fillStyle = '#F2722C';
                ctx.beginPath();
                ctx.ellipse(pw * 0.35 - legSpread, ph * 0.97, 7, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(pw * 0.65 + legSpread, ph * 0.97, 7, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body (jersey)
                ctx.fillStyle = '#F2722C';
                ctx.beginPath();
                ctx.roundRect(pw * 0.2, ph * 0.15, pw * 0.6, ph * 0.5, 6);
                ctx.fill();

                // Jersey number
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Oswald';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('NBC', pw / 2, ph * 0.35);

                // Arms
                ctx.strokeStyle = '#f0c090';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                if (this.player.isJumping) {
                    // Arms up
                    ctx.beginPath();
                    ctx.moveTo(pw * 0.2, ph * 0.25);
                    ctx.lineTo(pw * 0.05, ph * 0.05);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pw * 0.8, ph * 0.25);
                    ctx.lineTo(pw * 0.95, ph * 0.05);
                    ctx.stroke();
                } else {
                    // Arms down
                    ctx.beginPath();
                    ctx.moveTo(pw * 0.2, ph * 0.3);
                    ctx.lineTo(pw * 0.1, ph * 0.55);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pw * 0.8, ph * 0.3);
                    ctx.lineTo(pw * 0.9, ph * 0.55);
                    ctx.stroke();
                }

                // Head
                ctx.fillStyle = '#f0c090';
                ctx.beginPath();
                ctx.arc(pw / 2, ph * 0.1, 12, 0, Math.PI * 2);
                ctx.fill();

                // Hair
                ctx.fillStyle = '#4a3728';
                ctx.beginPath();
                ctx.arc(pw / 2, ph * 0.06, 10, Math.PI, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(pw / 2 - 4, ph * 0.09, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pw / 2 + 4, ph * 0.09, 2, 0, Math.PI * 2);
                ctx.fill();

                // Mouth (smile)
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(pw / 2, ph * 0.13, 4, 0.1, Math.PI - 0.1);
                ctx.stroke();

                ctx.restore();
            }

            gameOver() {
                this.state = 'gameover';

                // Death particles
                for (let i = 0; i < 20; i++) {
                    this.particles.push({
                        x: this.player.x + this.player.width / 2,
                        y: this.player.y + this.player.height / 2,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1,
                        color: i % 2 === 0 ? '#F2722C' : '#7457A3',
                        size: 4 + Math.random() * 6
                    });
                }

                const isNewRecord = this.score > this.highscore;
                if (isNewRecord) {
                    this.highscore = this.score;
                    setHighscore(this.score);
                }

                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('statJumps').textContent = this.jumps;
                document.getElementById('statDodged').textContent = this.dodged;
                document.getElementById('statTime').textContent = Math.floor(this.elapsed) + 's';
                document.getElementById('newRecordLabel').classList.toggle('hidden', !isNewRecord);
                document.getElementById('gameOverScreen').classList.remove('hidden');
                this.updateHighscoreDisplay();
            }

            updateScoreDisplay() {
                document.getElementById('score').textContent = this.score;
            }

            updateHighscoreDisplay() {
                document.getElementById('highscore').textContent = this.highscore;
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new RunAndJumpGame();
    </script>
